<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9633315289535323"
     crossorigin="anonymous"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>NeuralTrend</title>
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Plotly CDN (include once per page, ideally in <head>) -->
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    
    <style>
        :root {
            --nav-height: 110px; /* adjust if needed */
        
            --nt-positive: #16A34A;       /* green */
            --nt-negative: #DC2626;       /* red */
            --nt-neutral: #64748B;        /* slate gray */
            --nt-dark: #0F172A;
            --nt-blue: #2563EB;
            --nt-purple: #9333EA;
            --nt-selected-row: #EAF6FF;
            --nt-row-hover: #F8FAFC;
            --nt-border: #E2E8F0;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            font-size: 18px;
        }

        /* Navbar container */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a7d9c;
            padding: 10px 30px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            z-index: 1000;
        }

        /* Logo styling */
        .navbar .logo img {
            height: 100px;
        }

        /* Links container */
        .navbar .nav-links {
            display: flex;
        }

        /* Links styling */
        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            margin-left: 5px;
            font-size: 16px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        /* Hover effect */
        .navbar .nav-links a:hover {
            background-color: #575757;
        }
        

        .user-menu {
            position: relative;
            cursor: pointer;
        }

        /* User pill */
        .user-pill {
            background: white;
            color: #1a7d9c;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        
        .user-pill:hover {
            background: #f0f0f0;
        }
        
        /* Arrow */
        .user-pill .arrow {
            font-size: 10px;
        }
        
        /* Dropdown */
        .dropdown {
            position: absolute;
            right: 0;
            top: 120%;
            background: white;
            border-radius: 8px;
            min-width: 120px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        
        /* Dropdown item */
        .dropdown div {
            padding: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .dropdown div:hover {
            background: #f2f2f2;
        }

        /* Main content pushed down below navbar */
        main {
            padding-top: calc(var(--nav-height) + 20px);
            padding-left: 30px; /* added left padding */
        }

        .product-box {
            background-color: #f9f9f9; /* very light gray — you can use your own color */
            padding: 20px;
            border-radius: 8px; /* optional, for rounded edges */
            box-shadow: 0 0 10px rgba(0,0,0,0.05); /* optional, soft shadow */
        }

        .three-blocks {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 20px;
        }

        .block {
            background-color: #f9f9f9; /* Light gray box */
            border-radius: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .block-title {
            background-color: #e3e3e3; /* Title background */
            padding: 10px;
            font-weight: bold;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .block-chart {
            flex: 1;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            min-height: 300px; /* adjust chart height */
        
            /* Center widget content */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .block-bottom {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .block-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }
                
        .tradingview-widget-copyright {
            font-size: 10px !important;       /* smaller font */
            color: #666 !important;           /* subtle gray color */
            text-align: center !important;    /* center the text */
            padding-top: 5px !important;      /* some spacing from widget */
            font-family: Arial, sans-serif !important;
            user-select: none;                /* prevent selection if you want */
            opacity: 0.7;                    /* slight transparency */
        }
        
        /* Make the form layout two rows: title row and inputs row */
        #backtest-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #signal-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* First row (title) */
        .trade-form h3 {
            margin: 0;
            text-align: center;
        }
        
        /* Second row (all inputs in one line) */
        .form-row {
            display: flex;
            flex-wrap: wrap; /* Wrap on smaller screens */
            gap: 10px;
            justify-content: center;
        }
        
        /* Make labels and inputs stay together */
        .form-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        
        /* Reduce input width so they fit in one line */
        .form-group input,
        .form-group select {
            width: 145px;
        }
        
        #backtest-form label {
            margin: 0 5px 0 0; /* small space after label */
        }

        #backtest-form input,
        #backtest-form select,
        #backtest-form button {
            margin: 0 10px 0 0;
        }
        
        #backtest-form button {
            white-space: nowrap; /* prevents breaking button text */
        }
        
        /* Make form labels bigger */
        label {
            font-size: 15px;
        }
        
        /* Make inputs bigger (both text & number/date selectors) */
        input, select, textarea, button {
            font-size: 15px;   /* text inside box */
            padding: 8px 10px; /* a bit more padding for comfort */
        }
        
        /* Make placeholder text bigger */
        input::placeholder, textarea::placeholder {
            font-size: 15px;
        }

        /* Optional: make the "Run Backtest" button match */
        button {
            font-size: 15px;
            padding: 10px 15px;
            cursor: pointer;
        }

        /* Results section */
        .results-section {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            margin: 20px auto;
            width: 90%;
            max-width: 1200px;
            border: 1px solid #e0e0e0;
        }
        #results p {
            color: #000000;
            font-size: 20px;
            line-height: 1.6;
        }

        /* Smooth fade transition */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: block;
            opacity: 1;
        }
    
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border: 1px solid #888;
            width: 300px;
            border-radius: 8px;
            text-align: center;
        }

        .close-btn {
            float: right;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Icons */
        #modal-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        .success-icon { color: #2ecc71; }
        .error-icon { color: #e74c3c; }

        /* Animation */
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        
        .close-btn:hover { color: #000; }

        /* Auth area container */
        .auth-area {
            display: flex;
            align-items: center;
        }
        
        /* Login button */
        #login-btn {
            background: white;
            color: #1a7d9c;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 2px solid white;
        }
        
        /* Hover effect */
        #login-btn:hover {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        #signupBtn, #signinBtn {
            margin-top: 15px;
        }

        #forgot-password {
            font-size: 12px;
            color: #777;
            text-align: center;
        }

        #forgot-password:hover {
            text-decoration: underline;
            color: #000;
        }

        /* Footer styling */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            background-color: #f2f2f2;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        
        .footer a {
            color: black;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        
        /* Layout for Contact + Follow Us */
        /* Main layout: Contact Us + Follow Us side by side */
        #contact-section {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
            flex-wrap: wrap; /* Makes it responsive on small screens */
        }
        
        /* Shared box styling */
        .contact-box, .follow-box {
            flex: 1;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            min-width: 300px; /* Prevents boxes from shrinking too much */
        }

        /* Headings */
        .contact-box h2, .follow-box h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        
        /* Contact form styles */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .contact-form label {
            font-weight: bold;
        }
        
        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        .contact-form textarea {
            resize: vertical;
            min-height: 100px;
        }

        .contact-form button {
            background-color: #0077B5;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .contact-form button:hover {
            background-color: #005f87;
        }
        
        /* Follow Us buttons */
        .social-btn {
            display: block;
            padding: 12px 15px;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .social-btn i {
            margin-right: 10px;
        }

        /* Brand colors */
        .social-btn.linkedin { background-color: #0077B5; }
        .social-btn.twitter { background-color: #1DA1F2; }
        .social-btn.facebook { background-color: #1877F2; }
        .social-btn.instagram { background-color: #E1306C; }
        
        
        /* Hover effect for Follow Us buttons */
        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* ===============================
           Optional centered main title only
        ================================ */
        
        .nt-page-header-center {
            text-align: center;
        }
        
        .nt-page-header-center .nt-page-title {
            text-align: center;
        }

        /* ===============================
           Models section layout
        ================================ */
        
        .nt-models-section {
            max-width: 1180px;
            margin: 0 auto;
            padding: 36px 24px 60px 24px;
        }
        
        .nt-models-header {
            margin-bottom: 18px;
        }
        
        .nt-models-kicker {
            font-size: 12px;
            font-weight: 850;
            color: var(--nt-blue);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        
        .nt-models-title {
            margin: 0;
            font-size: 30px;
            font-weight: 900;
            color: var(--nt-dark);
        }
        
        .nt-models-subtitle {
            max-width: 760px;
            margin: 8px 0 0 0;
            font-size: 15px;
            line-height: 1.6;
            color: var(--nt-neutral);
            font-weight: 600;
        }
        
        .nt-model-tabs {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 18px 0 22px 0;
        }
        
        .nt-model-tab {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 14px;
            border-radius: 999px;
            border: 1px solid var(--nt-border);
            background: #ffffff;
            color: var(--nt-dark);
            text-decoration: none;
            font-size: 13px;
            font-weight: 850;
            transition: all 0.15s ease;
        }
        
        .nt-model-tab:hover {
            background: #F1F5F9;
            border-color: #CBD5E1;
        }
        
        .nt-model-tab.active {
            background: var(--nt-dark);
            border-color: var(--nt-dark);
            color: #ffffff;
        }
        
        .nt-models-container {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }
        
        .nt-model-panel {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
            padding: 22px;
            scroll-margin-top: calc(var(--nav-height) + 20px);
        }
        
        .nt-model-panel-header {
            margin-bottom: 18px;
        }
        
        .nt-model-panel-title {
            margin: 0;
            font-size: 22px;
            font-weight: 900;
            color: var(--nt-dark);
        }
        
        .nt-model-panel-description {
            margin: 8px 0 0 0;
            font-size: 14px;
            line-height: 1.6;
            color: var(--nt-neutral);
            font-weight: 600;
        }
        
        @media (max-width: 700px) {
            .nt-models-section {
                padding: 28px 14px 50px 14px;
            }
        
            .nt-models-title {
                font-size: 24px;
            }
        
            .nt-model-panel {
                padding: 16px;
            }
        }

        /* ===============================
           Consistent section title alignment
        ================================ */
        
        .nt-page-header {
            width: 100%;
            margin: 0 0 18px 0;
            text-align: left;
        }
        
        .nt-page-title {
            margin: 0;
            font-size: 22px;
            font-weight: 850;
            color: var(--nt-dark);
            text-align: left;
        }
        
        /* Override older centered form-title rules */
        .nt-backtest-section .nt-backtest-header {
            justify-content: flex-start;
            text-align: left;
            width: 100%;
        }
        
        .nt-backtest-section .nt-backtest-title {
            text-align: left !important;
        }
        
        .nt-backtest-section .trade-form h3 {
            text-align: left !important;
        }
        
        .nt-backtest-section #backtest-form {
            align-items: stretch !important;
        }
        
        .nt-backtest-section .form-row {
            justify-content: stretch !important;
        }

        /* ===============================
           Current view / active filters row
        ================================ */

        .nt-active-filter-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            flex-wrap: wrap;
            margin: 10px 0 12px 0;
            padding: 9px 12px;
            background: #F8FAFC;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
        }
        
        .nt-active-filter-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nt-active-filter-label {
            font-size: 12px;
            font-weight: 850;
            color: var(--nt-dark);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
    
        .nt-active-filter-chips {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
        }
        
        .nt-active-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 9px;
            border-radius: 999px;
            background: #F8FAFC;
            border: 1px solid var(--nt-border);
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 750;
        }

        .nt-active-chip.chip-assumption {
            color: var(--nt-dark);
            background: rgba(37, 99, 235, 0.06);
            border-color: rgba(37, 99, 235, 0.16);
        }
        
        .nt-active-chip.chip-buy {
            color: var(--nt-positive);
            background: rgba(22, 163, 74, 0.08);
            border-color: rgba(22, 163, 74, 0.20);
        }
        
        .nt-active-chip.chip-sell {
            color: var(--nt-negative);
            background: rgba(220, 38, 38, 0.08);
            border-color: rgba(220, 38, 38, 0.20);
        }
        
        .nt-active-chip.chip-hold {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.08);
            border-color: rgba(100, 116, 139, 0.20);
        }
        
        .nt-active-clear-btn {
            border: none;
            background: transparent;
            color: var(--nt-blue);
            font-size: 12px;
            font-weight: 850;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 999px;
            transition: all 0.15s ease;
        }
        
        .nt-active-clear-btn:hover {
            background: rgba(37, 99, 235, 0.08);
        }
        
        @media (max-width: 700px) {
            .nt-active-filter-row {
                align-items: flex-start;
            }
        
            .nt-active-clear-btn {
                width: 100%;
                text-align: left;
            }
        }

        /* ===============================
           Backtest results cards
        ================================ */
        
        .nt-backtest-results {
            margin-top: 18px;
        }
        
        .nt-backtest-results-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }
        
        .nt-backtest-results-title {
            margin: 0;
            font-size: 18px;
            font-weight: 850;
            color: var(--nt-dark);
        }
        
        .nt-backtest-results-subtitle {
            margin: 4px 0 0 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-result-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }
        
        .nt-result-pill strong {
            color: var(--nt-dark);
        }
        
        .nt-backtest-results-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 16px;
        }
        
        .nt-result-card {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            padding: 15px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
        }
        
        .nt-result-label {
            font-size: 12px;
            font-weight: 800;
            color: var(--nt-neutral);
            margin-bottom: 7px;
        }
        
        .nt-result-value {
            font-size: 24px;
            font-weight: 850;
            color: var(--nt-dark);
            line-height: 1.1;
        }
        
        .nt-result-sub {
            margin-top: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-backtest-chart-card {
            margin-top: 14px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            padding: 14px;
        }
        
        .nt-backtest-chart-title {
            font-size: 14px;
            font-weight: 850;
            color: var(--nt-dark);
            margin-bottom: 10px;
        }
        
        .nt-backtest-chart-shell {
            height: 430px;
            width: 100%;
            position: relative;
        }
        
        @media (max-width: 900px) {
            .nt-backtest-results-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        
        @media (max-width: 600px) {
            .nt-backtest-results-header {
                flex-direction: column;
            }
        
            .nt-backtest-results-grid {
                grid-template-columns: 1fr;
            }
        
            .nt-backtest-chart-shell {
                height: 320px;
            }
        }

        /* ===============================
           Return horizon segmented buttons
        ================================ */
        
        .nt-period-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nt-period-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--nt-dark);
            white-space: nowrap;
        }
        
        .nt-period-pills {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: #F1F5F9;
            border: 1px solid var(--nt-border);
            border-radius: 999px;
        }
        
        .period-pill {
            border: none;
            background: transparent;
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 800;
            padding: 7px 11px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .period-pill:hover {
            background: #E2E8F0;
            color: var(--nt-dark);
        }
        
        .period-pill.active {
            background: var(--nt-blue);
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.25);
        }

        /* ===============================
           NeuralTrend color system
           Step 1: table + signal colors
        ================================ */
        
        /* Signal badges */
        .signal-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 68px;
            padding: 3px 9px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        
        .signal-buy {
            color: var(--nt-positive);
            background: rgba(22, 163, 74, 0.10);
            border: 1px solid rgba(22, 163, 74, 0.22);
        }
        
        .signal-sell {
            color: var(--nt-negative);
            background: rgba(220, 38, 38, 0.10);
            border: 1px solid rgba(220, 38, 38, 0.22);
        }
        
        .signal-hold {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.10);
            border: 1px solid rgba(100, 116, 139, 0.18);
        }
        
        /* Return values */
        .return-value {
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        
        .return-positive {
            color: var(--nt-positive);
        }
        
        .return-negative {
            color: var(--nt-negative);
        }
        
        .return-neutral {
            color: var(--nt-neutral);
        }
        
        /* Signal board rows */
        .signal-row {
            transition: background 0.15s ease;
        }
        
        .signal-row:hover {
            background: var(--nt-row-hover);
        }
        
        .signal-row.selected {
            background: var(--nt-selected-row);
        }
        
        .signal-ticker {
            font-weight: 700;
            color: var(--nt-dark);
        }
        
        .signal-cell-right {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        
        .signal-cell-left {
            text-align: left;
        }

        /* ===============================
           Asset type segmented buttons
        ================================ */
        
        .nt-asset-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nt-asset-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--nt-dark);
            white-space: nowrap;
        }
        
        .nt-asset-pills {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: #F1F5F9;
            border: 1px solid var(--nt-border);
            border-radius: 999px;
        }
        
        .asset-pill {
            border: none;
            background: transparent;
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 800;
            padding: 7px 12px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .asset-pill:hover {
            background: #E2E8F0;
            color: var(--nt-dark);
        }
        
        .asset-pill.active {
            background: var(--nt-dark);
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.22);
        }

        /* ===============================
           Signal table header filters
        ================================ */
        
        .nt-signal-table-card {
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
            background: #ffffff;
        }
        
        .nt-signal-header {
            display: grid;
            grid-template-columns: 160px 100px 100px 100px 100px 140px 160px 120px;
            align-items: center;
            gap: 0;
            padding: 11px 12px;
            border-bottom: 1px solid var(--nt-border);
            background: #F8FAFC;
            font-size: 13px;
            font-weight: 800;
            color: var(--nt-dark);
            white-space: nowrap;
            box-sizing: border-box;
            width: 100%;
        }
        
        .nt-header-title {
            display: block;
            margin-bottom: 5px;
        }
        
        .nt-header-right {
            text-align: right;
            cursor: pointer;
            user-select: none;
        }
        
        .nt-header-right:hover {
            color: var(--nt-blue);
        }
        
        .nt-sort-indicator {
            display: inline-block;
            margin-top: 5px;
            min-width: 18px;
            font-size: 11px;
            font-weight: 700;
            color: var(--nt-neutral);
        }
        
        .nt-signal-filter-select {
            width: 86px;
            padding: 4px 7px;
            border-radius: 999px;
            border: 1px solid var(--nt-border);
            background: #ffffff;
            color: var(--nt-neutral);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
        }
        
        .nt-signal-filter-select:hover {
            border-color: var(--nt-blue);
            color: var(--nt-dark);
        }
        
        .nt-signal-filter-select:focus {
            border-color: var(--nt-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        
        .nt-filter-active {
            border-color: var(--nt-blue) !important;
            color: var(--nt-blue) !important;
            background: rgba(37, 99, 235, 0.07) !important;
        }

        /* ===============================
           Performance assumptions bar
        ================================ */
        
        .nt-assumptions-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
            margin: 14px 0 14px 0;
            padding: 12px 14px;
            background: #F8FAFC;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            color: var(--nt-dark);
        }
        
        .nt-assumptions-left {
            display: flex;
            align-items: center;
            gap: 9px;
            flex-wrap: wrap;
            font-size: 13px;
            font-weight: 600;
        }
        
        .nt-assumption-icon {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(37, 99, 235, 0.10);
            color: var(--nt-blue);
            font-weight: 900;
        }
        
        .nt-assumption-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 9px;
            border-radius: 999px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 700;
        }
        
        .nt-assumption-pill strong {
            color: var(--nt-dark);
        }
        
        .nt-assumptions-note {
            font-size: 12px;
            color: var(--nt-neutral);
            font-weight: 600;
        }

        /* ===============================
           Modern signal controls card
        ================================ */
        
        .nt-controls-card {
            margin-bottom: 14px;
            padding: 16px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
        }
        
        .nt-controls-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }
        
        .nt-section-eyebrow {
            font-size: 12px;
            font-weight: 800;
            color: var(--nt-blue);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }
        
        .nt-controls-title {
            margin: 0;
            font-size: 18px;
            font-weight: 800;
            color: var(--nt-dark);
        }
        
        .nt-controls-subtitle {
            margin: 4px 0 0 0;
            font-size: 13px;
            color: var(--nt-neutral);
            font-weight: 600;
        }
        
        .nt-controls-grid {
            display: grid;
            grid-template-columns: minmax(260px, 1.15fr) auto auto;
            gap: 14px;
            align-items: end;
        }
        
        .nt-control-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        
        .nt-control-label {
            font-size: 12px;
            font-weight: 800;
            color: var(--nt-dark);
        }
        
        .nt-search-shell {
            position: relative;
            width: 100%;
        }
        
        .nt-search-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--nt-neutral);
            pointer-events: none;
        }
        
        .nt-search-input {
            width: 100%;
            height: 42px;
            padding: 9px 12px 9px 38px;
            border-radius: 999px;
            border: 1px solid var(--nt-border);
            background: #F8FAFC;
            color: var(--nt-dark);
            font-size: 14px;
            font-weight: 600;
            outline: none;
            transition: all 0.15s ease;
        }
        
        .nt-search-input::placeholder {
            color: #94A3B8;
            font-weight: 500;
        }
        
        .nt-search-input:hover {
            background: #ffffff;
            border-color: #CBD5E1;
        }
        
        .nt-search-input:focus {
            background: #ffffff;
            border-color: var(--nt-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        
        .nt-reset-btn {
            border: 1px solid var(--nt-border);
            background: #ffffff;
            color: var(--nt-dark);
            border-radius: 999px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        
        .nt-reset-btn:hover {
            background: #F1F5F9;
            border-color: #CBD5E1;
        }
        
        @media (max-width: 1050px) {
            .nt-controls-grid {
                grid-template-columns: 1fr;
                align-items: stretch;
            }
        
            .nt-period-control,
            .nt-asset-control {
                align-items: flex-start;
            }
        }
        
        @media (max-width: 600px) {
            .nt-controls-top {
                flex-direction: column;
            }
        
            .nt-reset-btn {
                width: 100%;
            }
        }

        /* ===============================
           Equity preview chart card
        ================================ */
        
        .nt-preview-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 18px;
        }
        
        .nt-preview-card {
            width: 1100px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.07);
            padding: 18px;
        }
        
        .nt-preview-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 12px;
        }
        
        .nt-preview-title {
            margin: 0;
            font-size: 20px;
            font-weight: 850;
            color: var(--nt-dark);
        }
        
        .nt-preview-subtitle {
            margin: 5px 0 0 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-preview-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .nt-preview-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 9px;
            border-radius: 999px;
            background: #F8FAFC;
            border: 1px solid var(--nt-border);
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 700;
        }
        
        .nt-preview-chip strong {
            color: var(--nt-dark);
        }
        
        .nt-preview-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .nt-scale-btn {
            border: 1px solid var(--nt-border);
            background: #ffffff;
            color: var(--nt-dark);
            border-radius: 999px;
            padding: 9px 13px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .nt-scale-btn:hover {
            background: #F1F5F9;
            border-color: #CBD5E1;
        }
        
        .nt-preview-chart {
            height: 380px;
            width: 100%;
            position: relative;
            border-radius: 14px;
            border: 1px solid var(--nt-border);
            background: #ffffff;
            padding: 10px;
        }
        
        @media (max-width: 1150px) {
            .nt-preview-card {
                width: 100%;
            }
        }
        
        @media (max-width: 700px) {
            .nt-preview-header {
                flex-direction: column;
            }
        
            .nt-preview-actions {
                width: 100%;
            }
        
            .nt-scale-btn {
                width: 100%;
            }
        
            .nt-preview-chart {
                height: 320px;
            }
        }

        /* ===============================
           Selected asset performance cards
        ================================ */
        
        .nt-performance-panel {
            width: 100%;
            margin: 0 0 18px 0;
        }
        
        .nt-selected-meta {
            font-size: 14px;
            font-weight: 600;
            color: var(--nt-dark);
            margin-bottom: 12px;
        }
        
        .nt-selected-meta span {
            color: var(--nt-blue);
            font-weight: 800;
        }
        
        .nt-metric-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }
        
        .nt-metric-card {
            display: flex;
            align-items: center;
            gap: 14px;
            min-height: 92px;
            padding: 18px 20px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
        }
        
        .nt-card-icon {
            width: 48px;
            height: 48px;
            flex: 0 0 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
        }
        
        .nt-icon-blue {
            color: var(--nt-blue);
            background: rgba(37, 99, 235, 0.10);
        }
        
        .nt-icon-purple {
            color: var(--nt-purple);
            background: rgba(147, 51, 234, 0.10);
        }
        
        .nt-icon-green {
            color: var(--nt-positive);
            background: rgba(22, 163, 74, 0.10);
        }
        
        .nt-icon-neutral {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.12);
        }
        
        .nt-metric-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--nt-dark);
            margin-bottom: 5px;
        }
        
        .nt-metric-value {
            font-size: 26px;
            font-weight: 800;
            line-height: 1.1;
        }
        
        .nt-metric-sub {
            margin-top: 6px;
            font-size: 12px;
            color: var(--nt-neutral);
        }
        
        .nt-signal-value .signal-badge {
            min-width: 92px;
            padding: 6px 12px;
            font-size: 15px;
        }
        
        /* Responsive behavior */
        @media (max-width: 1000px) {
            .nt-metric-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        
        @media (max-width: 600px) {
            .nt-metric-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===============================
           Backtest simulation card
        ================================ */
        
        .nt-backtest-section {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.07);
            padding: 20px;
        }
        
        .nt-backtest-section #backtest-form {
            align-items: stretch;
            width: 100%;
        }
        
        .nt-backtest-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }
        
        .nt-backtest-title {
            margin: 0;
            font-size: 20px;
            font-weight: 850;
            color: var(--nt-dark);
        }
        
        .nt-backtest-subtitle {
            margin: 5px 0 0 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-backtest-section .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
            gap: 14px;
            align-items: end;
            justify-content: stretch;
        }
        
        .nt-backtest-section .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
            align-items: stretch;
        }
        
        .nt-backtest-section label {
            font-size: 12px;
            font-weight: 800;
            color: var(--nt-dark);
        }
        
        .nt-backtest-section input,
        .nt-backtest-section select {
            width: 100%;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--nt-border);
            background: #F8FAFC;
            color: var(--nt-dark);
            font-size: 14px;
            font-weight: 600;
            padding: 8px 10px;
            outline: none;
            transition: all 0.15s ease;
        }
        
        .nt-backtest-section input:hover,
        .nt-backtest-section select:hover {
            background: #ffffff;
            border-color: #CBD5E1;
        }
        
        .nt-backtest-section input:focus,
        .nt-backtest-section select:focus {
            background: #ffffff;
            border-color: var(--nt-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        
        .nt-run-backtest-btn {
            width: 100%;
            height: 42px;
            border: none;
            border-radius: 12px;
            background: var(--nt-blue);
            color: #ffffff;
            font-size: 14px;
            font-weight: 850;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .nt-run-backtest-btn:hover {
            background: #1D4ED8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        
        .nt-backtest-note {
            margin-top: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-backtest-section #results:not(:empty) {
            margin-top: 18px;
            padding: 16px;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            background: #F8FAFC;
        }

        .nt-backtest-chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 10px;
        }
        
        .nt-backtest-chart-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        @media (max-width: 650px) {
            .nt-backtest-chart-header {
                flex-direction: column;
                align-items: flex-start;
            }
        
            .nt-backtest-chart-actions {
                width: 100%;
            }
        
            .nt-backtest-chart-actions .nt-scale-btn {
                width: 100%;
            }
        }

        /* ===============================
           Model tabs: show one model at a time
        ================================ */
        
        .nt-model-tabs {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0 22px 0;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .nt-model-tab {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 9px 14px;
            border-radius: 999px;
            border: 1px solid var(--nt-border);
            background: #ffffff;
            color: var(--nt-dark);
            text-decoration: none;
            font-size: 13px;
            font-weight: 850;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
            flex: 0 0 auto;
        }
        
        .nt-model-tab:hover {
            background: #F1F5F9;
            border-color: #CBD5E1;
        }
        
        .nt-model-tab.active {
            background: var(--nt-dark);
            border-color: var(--nt-dark);
            color: #ffffff;
        }
        
        /* Hide inactive model panels */
        .nt-model-panel {
            display: none;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
            padding: 22px;
            overflow: hidden;
        }
        
        .nt-model-panel.nt-model-panel-active {
            display: block;
        }

        /* ===============================
           Prevent content overflow in model cards
        ================================ */
        
        .nt-model-panel,
        .nt-model-panel *,
        .nt-controls-card,
        .nt-metric-card,
        .nt-preview-card,
        .nt-backtest-section,
        .nt-signal-table-card {
            min-width: 0;
            box-sizing: border-box;
        }
        
        .nt-model-panel p,
        .nt-model-panel-description,
        .nt-controls-subtitle,
        .nt-preview-subtitle,
        .nt-backtest-subtitle,
        .nt-backtest-note {
            overflow-wrap: break-word;
            word-break: normal;
        }
        
        .nt-model-panel .results-section {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            box-sizing: border-box;
        }
        
        #equity-preview-container,
        .nt-preview-card {
            width: 100% !important;
            max-width: 100% !important;
        }
        
        #equity-preview-chart,
        .nt-preview-chart,
        .nt-backtest-chart-shell {
            width: 100% !important;
            max-width: 100% !important;
        }
        
        .nt-metric-grid {
            width: 100%;
        }
        
        .nt-controls-grid {
            width: 100%;
        }
        
        .nt-signal-table-card {
            width: 100%;
        }
        
        /* Keep large dashboard pieces from breaking the model card */
        @media (max-width: 1200px) {
            .nt-metric-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        
        @media (max-width: 700px) {
            .nt-metric-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===============================
           Typography hierarchy cleanup
           Keeps page cleaner and less crowded
        ================================ */
        
        /* Global page tuning */
        body {
            font-size: 16px;
            color: var(--nt-dark);
        }
        
        /* Main page content */
        main {
            padding-top: calc(var(--nav-height) + 32px);
            padding-left: 30px;
            padding-right: 30px;
        }
        
        /* Top site title: NeuralTrend */
        main > h1 {
            margin: 0 0 12px 0;
            font-size: 30px;
            line-height: 1.15;
            font-weight: 900;
            color: var(--nt-dark);
        }
        
        main > p {
            max-width: 960px;
            margin: 0 0 34px 0;
            font-size: 15px;
            line-height: 1.6;
            color: var(--nt-dark);
            font-weight: 500;
        }
        
        /* Models section should not compete with main NeuralTrend title */
        .nt-models-section {
            padding-top: 16px;
        }
        
        .nt-models-header {
            margin-bottom: 16px;
        }
        
        .nt-models-kicker,
        .nt-section-eyebrow {
            font-size: 11px;
            line-height: 1.2;
            font-weight: 850;
            letter-spacing: 0.055em;
            text-transform: uppercase;
            color: var(--nt-blue);
        }
        
        .nt-models-title {
            margin: 0;
            font-size: 24px;
            line-height: 1.2;
            font-weight: 900;

        /* ===============================
           Page width and alignment cleanup
        ================================ */
        
        .nt-page-container {
            width: min(1280px, calc(100vw - 64px));
            margin: 0 auto;
        }
        
        /* Remove old inconsistent left spacing from main */
        main {
            padding-top: calc(var(--nav-height) + 32px);
            padding-left: 0 !important;
            padding-right: 0 !important;
        }
        
        /* Top intro section */
        .nt-site-intro {
            margin-bottom: 28px;
        }
        
        .nt-site-title {
            margin: 0 0 10px 0;
            font-size: 30px;
            line-height: 1.15;
            font-weight: 900;
            color: var(--nt-dark);
        }
        
        .nt-site-subtitle {
            max-width: 980px;
            margin: 0;
            font-size: 15px;
            line-height: 1.6;
            color: var(--nt-dark);
            font-weight: 500;
        }
        
        /* Make models section use the same page width */
        .nt-models-section {
            width: 100%;
            max-width: none !important;
            margin: 0 !important;
            padding: 16px 0 60px 0 !important;
        }
        
        /* Make model cards use available width cleanly */
        .nt-models-container {
            width: 100%;
        }
        
        .nt-model-panel {
            width: 100%;
        }
        
        /* Large dashboard pieces should fill the card */
        .results-section {
            width: 100% !important;
            max-width: 100% !important;
        }
        
        /* On smaller screens, keep breathing room */
        @media (max-width: 700px) {
            .nt-page-container {
                width: min(100%, calc(100vw - 28px));
            }
        
            .nt-site-title {
                font-size: 26px;
            }
        }

        /* ===============================
           Vertical model selector
        ================================ */
        
        .nt-model-layout {
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr);
            gap: 22px;
            align-items: start;
        }
        
        .nt-model-sidebar {
            position: sticky;
            top: calc(var(--nav-height) + 24px);
            align-self: start;
        }
        
        .nt-model-sidebar-card {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
            padding: 14px;
        }
        
        .nt-model-sidebar-title {
            margin: 0 0 12px 0;
            font-size: 12px;
            line-height: 1.2;
            font-weight: 850;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--nt-blue);
        }
        
        .nt-model-tabs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 0;
            overflow: visible;
            padding: 0;
        }
        
        .nt-model-tab {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            text-align: left;
            gap: 4px;
            padding: 14px 14px;
            border-radius: 14px;
            border: 1px solid var(--nt-border);
            background: #ffffff;
            color: var(--nt-dark);
            font-size: 14px;
            font-weight: 850;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: normal;
            flex: initial;
        }
        
        .nt-model-tab:hover {
            background: #F8FAFC;
            border-color: #CBD5E1;
            transform: translateY(-1px);
        }
        
        .nt-model-tab.active {
            background: var(--nt-dark);
            border-color: var(--nt-dark);
            color: #ffffff;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.14);
        }
        
        .nt-model-tab-name {
            font-size: 14px;
            line-height: 1.25;
            font-weight: 900;
        }
        
        .nt-model-tab-desc {
            font-size: 12px;
            line-height: 1.35;
            font-weight: 600;
            opacity: 0.78;
        }
        
        .nt-model-content {
            min-width: 0;
        }
        
        .nt-model-panel {
            display: none;
        }
        
        .nt-model-panel.nt-model-panel-active {
            display: block;
        }
        
        /* Optional: slightly stronger model panel look */
        .nt-model-panel {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
            padding: 22px;
            overflow: hidden;
        }
        
        /* Responsive fallback */
        @media (max-width: 980px) {
            .nt-model-layout {
                grid-template-columns: 1fr;
            }
        
            .nt-model-sidebar {
                position: static;
            }
        
            .nt-model-sidebar-card {
                padding: 12px;
            }
        
            .nt-model-tabs {
                flex-direction: row;
                flex-wrap: wrap;
            }
        
            .nt-model-tab {
                width: auto;
                min-width: 180px;
                flex: 1 1 220px;
            }
        }
        
        @media (max-width: 640px) {
            .nt-model-tab {
                min-width: 100%;
            }
        }

        /* ===============================
           Model summary cards
        ================================ */
        
        .nt-model-summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin: 16px 0 20px 0;
        }
        
        .nt-model-summary-card {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 13px 14px;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            background: #F8FAFC;
            min-width: 0;
        }
        
        .nt-model-summary-icon {
            width: 34px;
            height: 34px;
            flex: 0 0 34px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(37, 99, 235, 0.10);
            color: var(--nt-blue);
            font-size: 16px;
            font-weight: 900;
        }
        
        .nt-model-summary-label {
            font-size: 11px;
            line-height: 1.25;
            font-weight: 850;
            color: var(--nt-neutral);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }
        
        .nt-model-summary-value {
            font-size: 13px;
            line-height: 1.35;
            font-weight: 850;
            color: var(--nt-dark);
        }
        
        @media (max-width: 1050px) {
            .nt-model-summary-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        
        @media (max-width: 600px) {
            .nt-model-summary-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===============================
           EpochSignaler dashboard width cleanup
        ================================ */
        
        :root {
            --nt-signal-columns:
                minmax(130px, 1.15fr)
                repeat(4, minmax(95px, 0.85fr))
                minmax(135px, 1fr)
                minmax(150px, 1.05fr)
                minmax(145px, 1fr);
        }
        
        /* The EpochSignaler content should use the full model panel width */
        #epochsignaler-section {
            overflow: visible;
        }
        
        /* Remove old card-in-card squeeze from the main signal dashboard section */
        #epochsignaler-section .results-section.nt-epoch-dashboard {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
            box-shadow: none !important;
            background: transparent !important;
        }
        
        /* Full-width shell for signal overview */
        .nt-signal-board-shell {
            width: 100%;
            max-width: 100%;
            margin: 0;
        }
        
        /* Inner signal board card */
        .nt-signal-board-inner {
            width: 100%;
            max-width: 100%;
        }
        
        /* Keep table aligned and scroll only if screen is too narrow */
        .nt-signal-table-card {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
        }
        
        /* Header and rows must use the same column system */
        .nt-signal-header {
            grid-template-columns: var(--nt-signal-columns) !important;
            min-width: 980px;
        }
        
        #signal-board .signal-row {
            grid-template-columns: var(--nt-signal-columns) !important;
            min-width: 980px;
        }
        
        /* Body area keeps vertical scrolling */
        #signal-board {
            max-height: 280px;
            overflow-y: auto;
            overflow-x: visible;
        }
        
        /* Make dashboard cards use full width */
        #selected-performance-panel,
        .nt-controls-card,
        .nt-active-filter-row,
        .nt-preview-wrapper,
        .nt-backtest-section {
            width: 100%;
            max-width: 100%;
        }
        
        /* Remove unnecessary centering from old wrappers if still present */
        #epochsignaler-section [style*="justify-content: center"] {
            justify-content: stretch !important;
        }
        
        /* Equity preview should fill available width */
        #equity-preview-container,
        .nt-preview-card {
            width: 100% !important;
            max-width: 100% !important;
        }
        
        /* Backtest card should align with rest of dashboard */
        #epochsignaler-section .nt-backtest-section {
            margin-top: 18px;
        }
        
        /* On very wide screens, keep model layout balanced */
        @media (min-width: 1400px) {
            .nt-page-container {
                width: min(1440px, calc(100vw - 72px));
            }
        }
        
        /* On medium screens, let the model dashboard breathe */
        @media (max-width: 1200px) {
            .nt-model-layout {
                grid-template-columns: 220px minmax(0, 1fr);
                gap: 18px;
            }
        }
        
        @media (max-width: 980px) {
            .nt-model-layout {
                grid-template-columns: 1fr;
            }
        
            .nt-signal-header,
            #signal-board .signal-row {
                min-width: 920px;
            }
        }

        /* ===============================
           Navbar + top intro refinement
        ================================ */
        
        /* Reduce old oversized navbar */
        :root {

        }
        
        .navbar {
            height: var(--nav-height) !important;
            padding: 8px 28px !important;

            box-shadow: 0 4px 18px rgba(15, 23, 42, 0.18);

        .navbar .logo img {

            width: auto;
            object-fit: contain;
        }
        
        .navbar .nav-links {

            gap: 4px;
        }
        
        .navbar .nav-links a {
            color: rgba(255, 255, 255, 0.86) !important;
            font-size: 14px !important;
            font-weight: 750;
            padding: 8px 11px !important;
            border-radius: 999px !important;

        }
        
        .navbar .nav-links a:hover {

            color: #ffffff !important;

        #login-btn,
        .user-pill {

            border: 1px solid rgba(255, 255, 255, 0.35) !important;
            border-radius: 999px !important;

        /* Give content better breathing room below the fixed nav */

            background:

        .nt-site-kicker {

            align-items: center;
            gap: 7px;
            margin-bottom: 10px;

            border-radius: 999px;

            font-weight: 850;

        .nt-site-title {
            margin: 0;
            color: #ffffff;
            font-size: 32px;

        .nt-site-subtitle {

            align-items: stretch;
            padding: 26px;
            border-radius: 22px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
        }
        
        .nt-contact-kicker {
            font-size: 11px;
            line-height: 1.2;
            font-weight: 850;
            letter-spacing: 0.055em;
            text-transform: uppercase;
            color: var(--nt-blue);
            margin-bottom: 8px;
        }
        
        .nt-contact-title {
            margin: 0;
            font-size: 22px;
            line-height: 1.25;
            font-weight: 900;
            color: var(--nt-dark);
        }
        
        .nt-contact-subtitle {

            font-size: 14px;
            line-height: 1.6;
            color: var(--nt-neutral);
            font-weight: 600;
        }

            font-size: 13px;
            font-weight: 850;
            transition: all 0.15s ease;
        }
        
        .nt-social-link:hover {

            border-color: rgba(37, 99, 235, 0.28);
            color: var(--nt-blue);
            transform: translateY(-1px);
        }
        
        .nt-social-icon {
            width: 26px;
            height: 26px;
            flex: 0 0 26px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(37, 99, 235, 0.10);
            color: var(--nt-blue);
            font-size: 11px;
            font-weight: 900;

        .nt-contact-note {

            padding-top: 16px;

            font-size: 12px;
            line-height: 1.55;
            color: var(--nt-neutral);
            font-weight: 600;
        }

            padding: 20px;
            border-radius: 18px;
            background: #F8FAFC;
            border: 1px solid var(--nt-border);
        }
        
        .nt-contact-form-title {
            margin: 0 0 4px 0;
            font-size: 17px;
            line-height: 1.25;
            font-weight: 900;
            color: var(--nt-dark);

        .nt-contact-form-subtitle {

        }
        
        .nt-live-sim-refresh-btn:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            transform: none;

        /* ===============================
           Live simulation CSV status
        ================================ */

        .nt-live-sim-signal-badge::before {

            border-radius: 999px;

        .nt-live-sim-signal-badge.buy {

        .nt-live-sim-signal-badge.sell {
            color: var(--nt-negative);
            background: rgba(220, 38, 38, 0.10);

        .nt-live-sim-signal-badge.hold {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.12);
        }
        
        .nt-live-sim-signal-badge.unknown {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.08);
        }
        
        .nt-live-sim-signal-price {
            font-size: 11px;
            line-height: 1.35;
            font-weight: 750;
            color: var(--nt-neutral);

        .nt-live-sim-detail-signal-wrap {

        /* ===============================

        ================================ */
        
        .nt-live-sim-item.just-created {
            border-color: rgba(22, 163, 74, 0.65);
            background: rgba(22, 163, 74, 0.08);
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.10);
            animation: ntLiveSimCreatedPulse 1.8s ease-out;
        }
        
        @keyframes ntLiveSimCreatedPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.28);
            }
        
            40% {
                transform: scale(1.015);
                box-shadow: 0 0 0 8px rgba(22, 163, 74, 0.13);
            }
        
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.10);
            }

        /* ===============================
           Live simulation logged-out state
        ================================ */
        
        .nt-live-sim-auth-empty {
            border: 1px dashed rgba(37, 99, 235, 0.35);
            background: rgba(37, 99, 235, 0.045);
            border-radius: 16px;
            padding: 18px;
            margin-top: 14px;
        }
        
        .nt-live-sim-auth-kicker {
            font-size: 11px;
            font-weight: 900;
            color: var(--nt-blue);
            text-transform: uppercase;
            letter-spacing: 0.055em;
            margin-bottom: 6px;
        }
        
        .nt-live-sim-auth-title {
            font-size: 16px;
            line-height: 1.25;
            font-weight: 900;
            color: var(--nt-dark);
            margin-bottom: 7px;
        }
        
        .nt-live-sim-auth-text {
            font-size: 13px;
            line-height: 1.55;
            font-weight: 600;
            color: var(--nt-neutral);
            margin-bottom: 12px;
        }
        
        .nt-live-sim-auth-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .nt-live-sim-auth-btn {
            border: none;
            border-radius: 999px;
            background: var(--nt-dark);
            color: #ffffff;
            padding: 9px 13px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .nt-live-sim-auth-btn:hover {
            background: var(--nt-blue);
            transform: translateY(-1px);
        }
        
        .nt-live-sim-auth-note {
            font-size: 11px;
            line-height: 1.4;
            font-weight: 700;
            color: var(--nt-neutral);
        }

        /* ===============================
           Live simulation layout rebalance
           Create form narrower, simulations wider
        ================================ */
        
        .nt-live-sim-layout {
            grid-template-columns: minmax(360px, 520px) minmax(420px, 1fr);
            align-items: stretch;
        }
        
        .nt-live-sim-layout > .nt-live-sim-card:first-child .nt-live-sim-form-grid {
            grid-template-columns: 1fr;
        }
        
        .nt-live-sim-layout > .nt-live-sim-card:nth-child(2) {
            min-width: 0;
        }
        
        .nt-live-sim-layout > .nt-live-sim-card:nth-child(2) .nt-live-sim-list {
            max-height: 520px;
        }
        
        @media (max-width: 1050px) {
            .nt-live-sim-layout {
                grid-template-columns: minmax(320px, 430px) minmax(360px, 1fr);
            }
        }
        
        @media (max-width: 850px) {
            .nt-live-sim-layout {
                grid-template-columns: 1fr;
            }
        }

        /* ===============================
           Equal height live simulation cards
        ================================ */
        
        .nt-live-sim-layout {
            align-items: stretch;
        }
        
        /* Make both top cards stretch to the same row height */
        .nt-live-sim-layout > .nt-live-sim-card {

        .nt-live-sim-layout > .nt-live-sim-card:first-child,
        .nt-live-sim-layout > .nt-live-sim-card:nth-child(2) {

    <!-- ✅ PAGE CONTENT -->

    </div>

    <!-- ✅ LOGIN MODAL -->

      <div class="modal-content">
    
        <span class="close-btn">&times;</span>
    
        <h3>Login / Signup</h3>

        <input type="email" id="emailInput" placeholder="Email">
        <input type="password" id="passwordInput" placeholder="Password">       
        
        <button id="signupBtn">Sign up</button>
        <button id="signinBtn">Login</button>

        <a href="#" id="forgot-password" style="display:block; margin:10px 0; font-size: 13px;">
            Forgot password?
        </a>  
    
        <p id="authMessage"></p>
    
      </div>
