    <!-- ✅ SCRIPT -->
    <script>
    
    let equityChart = null;

    window.backtestLogScale = window.backtestLogScale || false;
        
    document.getElementById('backtest-form').addEventListener('submit', function(e) {
        e.preventDefault();
    
        const formData = new FormData(this);
        fetch('/backtest', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            renderResults(data);
        })
        .catch(error => console.error('Error:', error));
    });

    function formatBacktestCurrency(value) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return "—";
        }
    
        return "$" + Number(value).toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }
    
    function formatBacktestReturnFromFactor(factor) {
        if (factor === null || factor === undefined || Number.isNaN(factor)) {
            return `<span class="return-value return-neutral">—</span>`;
        }
    
        const returnValue = factor - 1;
        const percent = returnValue * 100;
        const sign = percent > 0 ? "+" : "";
    
        let cls = "return-neutral";
        if (returnValue > 0) cls = "return-positive";
        if (returnValue < 0) cls = "return-negative";
    
        return `
            <span class="return-value ${cls}">
                ${sign}${percent.toFixed(1)}%
            </span>
        `;
    }
    
    function formatBacktestNumber(value, decimals = 2) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return "—";
        }
    
        return Number(value).toFixed(decimals);
    }

    function renderResults({
        ticker, final_value, final_value_epoch, profit_factor, profit_factor_epoch, sharpe_ratio,
        position_size_pct = 100, transaction_cost_rate = 0,
        equity_curve, epoch_equity_curve, dates,
        ticker_2, final_value_2, profit_factor_2, sharpe_ratio_2,
        equity_curve_2, buy_dates, buy_prices, sell_dates, sell_prices
    }) {
        const resultsDiv = document.getElementById('results');
    
        const aiReturnHTML = formatBacktestReturnFromFactor(profit_factor_epoch);
        const buyHoldReturnHTML = formatBacktestReturnFromFactor(profit_factor);
        
        resultsDiv.innerHTML = `
            <div class="nt-backtest-results">
        
                <div class="nt-backtest-results-header">
                    <div>
                        <div class="nt-section-eyebrow">Backtest Results</div>
                        <h3 class="nt-backtest-results-title">${ticker} Backtest Results</h3>
                        <p class="nt-backtest-results-subtitle">
                            AI strategy performance compared with buy & hold. Transaction cost: ${(transaction_cost_rate * 100).toFixed(2)}% per trade.
                        </p>
                    </div>
        
                    <span class="nt-result-pill">
                        Position Size: <strong>${formatBacktestNumber(position_size_pct, 0)}%</strong>
                    </span>
                </div>
        
                <div class="nt-backtest-results-grid">
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">AI Strategy Final Value</div>
                        <div class="nt-result-value">${formatBacktestCurrency(final_value_epoch)}</div>
                        <div class="nt-result-sub">EpochSignaler result</div>
                    </div>
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">Buy & Hold Final Value</div>
                        <div class="nt-result-value">${formatBacktestCurrency(final_value)}</div>
                        <div class="nt-result-sub">Benchmark result</div>
                    </div>
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">Sharpe Ratio</div>
                        <div class="nt-result-value">${formatBacktestNumber(sharpe_ratio, 2)}</div>
                        <div class="nt-result-sub">Based on selected period</div>
                    </div>
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">AI Strategy Return</div>
                        <div class="nt-result-value">${aiReturnHTML}</div>
                        <div class="nt-result-sub">Compared to initial cash</div>
                    </div>
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">Buy & Hold Return</div>
                        <div class="nt-result-value">${buyHoldReturnHTML}</div>
                        <div class="nt-result-sub">Compared to initial cash</div>
                    </div>
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">Position Size</div>
                        <div class="nt-result-value">${formatBacktestNumber(position_size_pct, 0)}%</div>
                        <div class="nt-result-sub">Applied per BUY/SELL signal</div>
                    </div>
        
                </div>
        
                <div class="nt-backtest-chart-card">

                    <div class="nt-backtest-chart-header">
                        <div class="nt-backtest-chart-title">
                            Equity Curve: AI Strategy vs Buy & Hold
                        </div>
                
                        <div class="nt-backtest-chart-actions">
                            <span class="nt-result-pill">
                                Scale: 
                                <strong id="backtest-scale-mode">
                                    ${window.backtestLogScale ? "Log" : "Linear"}
                                </strong>
                            </span>
                
                            <button id="backtest-scale-toggle-btn" class="nt-scale-btn" type="button">
                                ${window.backtestLogScale ? "Normal Scale" : "Log Scale"}
                            </button>
                        </div>
                    </div>
                
                    <div class="nt-backtest-chart-shell">
                        <canvas id="equity-chart"></canvas>
                    </div>
                
                </div>
        
            </div>
        `;
    
        const ctx = document.getElementById('equity-chart').getContext('2d');
    
        // --- Compute dynamic offset for markers ---
        const equity_min = Math.min(...epoch_equity_curve);
        const equity_max = Math.max(...epoch_equity_curve);
        const offset = (equity_max - equity_min) * 0.04; // 4% of range
    
        const adjustedBuySignals = dates.map((d, i) => buy_dates.includes(d) ? epoch_equity_curve[i] - offset : null);
        const adjustedSellSignals = dates.map((d, i) => sell_dates.includes(d) ? epoch_equity_curve[i] + offset : null);
    
        const datasets = [
            {
                label: `${ticker} EpochSignaler Equity Curve`,
                data: epoch_equity_curve,
                borderColor: NT_COLORS.chartAI,
                backgroundColor: NT_COLORS.chartAI,
                pointStyle: 'line',
                pointRadius: 0,
                borderWidth: 2,
                fill: false
            },
            {
                label: `${ticker} Buy&Hold Equity Curve`,
                data: equity_curve,
                borderColor: NT_COLORS.chartBuyHold,
                backgroundColor: NT_COLORS.chartBuyHold,
                pointStyle: 'line',
                borderDash: [5, 5],
                pointRadius: 0,
                borderWidth: 2,
                fill: false
            },
            {
                label: 'Buy Signal',
                data: adjustedBuySignals,
                pointStyle: 'triangle',
                pointRadius: 10,
                backgroundColor: NT_COLORS.buy,
                borderColor: NT_COLORS.buy,
                showLine: false
            },
            {
                label: 'Sell Signal',
                data: adjustedSellSignals,
                pointStyle: 'triangle',
                rotation: 180,
                pointRadius: 10,
                backgroundColor: NT_COLORS.sell,
                borderColor: NT_COLORS.sell,
                showLine: false
            }
        ];
    
        if (equity_curve_2 && equity_curve_2.length > 0) {
            datasets.push({
                label: `${ticker_2} Buy&Hold Equity Curve`,
                data: equity_curve_2,
                pointStyle: 'line',
                borderColor: 'darkgray',
                pointRadius: 0,   // <-- remove circle markers
                fill: false
            });
        }
    
        // new Chart(ctx, {
        if (equityChart) {
            equityChart.destroy();
        }
        
        equityChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: { usePointStyle: true }  // match triangle markers
                    }
                },
                scales: {
                    x: { 
                        display: true, 
                        title: { display: true, text: 'Date' } 
                    },
                    y: { 
                        display: true,
                        type: window.backtestLogScale ? "logarithmic" : "linear",
                        title: { display: true, text: 'Equity ($)' } 
                    }
                }
            }
        });
    }
        
    </script>
    
    <script>
    /* ===============================
       1. HELPERS
    ================================ */
    
    let allSignals = [];
    let defaultOrder = [];
    let assetTypeFilter = "crypto";
    let isLogScale = false;

    const NT_COLORS = {
        positive: "#16A34A",
        negative: "#DC2626",
        neutral: "#64748B",
        dark: "#0F172A",
        chartAI: "#2563EB",
        chartBuyHold: "#9333EA",
        buy: "#16A34A",
        sell: "#DC2626"
    };
    
    let signalFilters = {
        today_signal: null,
        yesterday_signal: null,
        last_week_signal: null,
        last_month_signal: null
    };

    function clearSignalBoardFilters() {

        // Reset signal filter state
        signalFilters = {
            today_signal: null,
            yesterday_signal: null,
            last_week_signal: null,
            last_month_signal: null
        };
    
        // Reset signal filter dropdowns
        document.querySelectorAll(".signal-filter").forEach(select => {
            select.value = "";
            select.classList.remove("nt-filter-active");
        });
    
        // Reset search bar
        const searchInput = document.getElementById("ticker-search");
        if (searchInput) {
            searchInput.value = "";
            searchInput.blur();
        }
    
        // Reset sorting
        currentSort = {
            key: null,
            direction: 1
        };
    
        updateSortIndicators();
    
        // Reset asset type to Crypto
        assetTypeFilter = "crypto";
    
        const assetSelect = document.getElementById("asset-type-filter");
        if (assetSelect) {
            assetSelect.value = "crypto";
        }
    
        if (typeof syncAssetPills === "function") {
            syncAssetPills();
        }
    
        // Reset return horizon to 5Y
        const periodSelect = document.getElementById("period-select");
        const horizonChanged = periodSelect && periodSelect.value !== "5y";
    
        if (periodSelect) {
            periodSelect.value = "5y";
        }
    
        if (typeof syncPeriodPills === "function") {
            syncPeriodPills();
        }
    
        // If horizon changed, reload data for 5Y.
        // Otherwise, just reapply local filters.
        if (horizonChanged && periodSelect) {
            periodSelect.dispatchEvent(new Event("change", { bubbles: true }));
        } else {
            applyAllFilters();
        }
    }

    function escapeHTML(value) {
        return String(value).replace(/[&<>"']/g, function (char) {
            return {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[char];
        });
    }
    
    function plainSignalText(value) {
        if (value === 1) return "BUY";
        if (value === -1) return "SELL";
        return "HOLD";
    }
    
    function signalChipClass(value) {
        if (value === 1) return "chip-buy";
        if (value === -1) return "chip-sell";
        return "chip-hold";
    }
    
    function assetTypeLabel(value) {
        if (value === "all") return "All Assets";
        if (value === "crypto") return "Crypto";
        if (value === "stock") return "Stocks";
        return value;
    }
    
    function sortLabel(key) {
        if (key === "buy_hold_annual_return") return "Buy & Hold Return";
        if (key === "strategy_annual_return") return "AI Strategy Return";
        if (key === "outperformance") return "AI vs Buy & Hold";
        return "";
    }
    
    function updateActiveFilterChips(count) {
        const row = document.getElementById("active-filter-row");
        const chipsContainer = document.getElementById("active-filter-chips");
    
        if (!row || !chipsContainer) return;
    
        const chips = [];
    
        const duration = document.getElementById("period-select")?.value || "5y";
        chips.push({
            label: `Return Horizon: ${durationLabel(duration)}`,
            className: ""
        });
    
        chips.push({
            label: `Asset Type: ${assetTypeLabel(assetTypeFilter)}`,
            className: ""
        });
    
        const visibleCount = Number.isFinite(count) ? count : allSignals.length;
        chips.push({
            label: `Assets Shown: ${visibleCount}`,
            className: ""
        });

        chips.push({
            label: "Assumptions: $1 normalized · 100% in/out · costs included",
            className: "chip-assumption"
        });
    
        const searchQuery = document.getElementById("ticker-search")?.value.trim();
        if (searchQuery) {
            chips.push({
                label: `Search: ${searchQuery}`,
                className: ""
            });
        }
    
        const signalLabels = {
            today_signal: "Today",
            yesterday_signal: "Yesterday",
            last_week_signal: "Last Week",
            last_month_signal: "Last Month"
        };
    
        Object.keys(signalFilters).forEach(key => {
            const value = signalFilters[key];
    
            if (value !== null) {
                chips.push({
                    label: `${signalLabels[key]}: ${plainSignalText(value)}`,
                    className: signalChipClass(value)
                });
            }
        });
    
        if (currentSort.key) {
            const direction = currentSort.direction === 1 ? "Ascending" : "Descending";
    
            chips.push({
                label: `Sort: ${sortLabel(currentSort.key)} (${direction})`,
                className: ""
            });
        }
    
        chipsContainer.innerHTML = chips.map(chip => `
            <span class="nt-active-chip ${chip.className}">
                ${escapeHTML(chip.label)}
            </span>
        `).join("");
    }

    function syncBacktestTicker(ticker) {
        const tickerSelect = document.getElementById("ticker");
        if (!tickerSelect || !ticker) return;
    
        const optionExists = Array.from(tickerSelect.options)
            .some(option => option.value === ticker);
    
        if (optionExists) {
            tickerSelect.value = ticker;
        }
    }

    function defaultLiveSimulationName(ticker) {
        const positionSelect = document.getElementById("live-sim-position");
        const positionPct = positionSelect ? positionSelect.value : "50";
    
        return `${ticker} ${positionPct}% Live Simulation`;
    }
    
    function syncLiveSimulationTicker(ticker) {
        if (!ticker) return;

        const selectedTickerLabel = document.getElementById("live-sim-selected-ticker-label");
        if (selectedTickerLabel) {
            selectedTickerLabel.textContent = ticker;
        }
    
        const tickerInput = document.getElementById("live-sim-ticker");
        const nameInput = document.getElementById("live-sim-name");
    
        if (tickerInput) {
            tickerInput.value = ticker;
        }
    
        if (nameInput) {
            const shouldAutoUpdateName =
                !nameInput.value.trim() ||
                nameInput.dataset.autoName === "true" ||
                nameInput.value.includes("Live Simulation");
    
            if (shouldAutoUpdateName) {
                nameInput.value = defaultLiveSimulationName(ticker);
                nameInput.dataset.autoName = "true";
            }
        }
    }
    
    function applyAllFilters() {
    
        let filtered = [...defaultOrder];
    
        // 1️⃣ Search filter
        const query = document.getElementById('ticker-search').value.toLowerCase();
        if (query) {
            filtered = filtered.filter(item =>
                item.ticker.toLowerCase().includes(query)
            );
        }
    
        // 2️⃣ Asset type filter
        if (assetTypeFilter !== "all") {
        
            filtered = filtered.filter(item => {
        
                const isCrypto = item.ticker.endsWith("-USD");
        
                if (assetTypeFilter === "crypto") return isCrypto;
                if (assetTypeFilter === "stock") return !isCrypto;
        
                return true;
            });
        }
    
        // 2️⃣ Signal filters (AND logic)
        Object.keys(signalFilters).forEach(key => {
            const val = signalFilters[key];
            if (val !== null) {
                filtered = filtered.filter(item => item[key] === val);
            }
        });
    
        // 3️⃣ Sorting
        if (currentSort.key) {
            filtered.sort((a, b) => {
                let valA = a[currentSort.key] ?? 0;
                let valB = b[currentSort.key] ?? 0;
                return (valA - valB) * currentSort.direction;
            });
        }

        allSignals = filtered;
        renderBoard(filtered);
        updateAssumptionsBar(filtered.length);
        updateActiveFilterChips(filtered.length);
    }
    
    function getReturnClass(value) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return "return-neutral";
        }
    
        if (value > 0) return "return-positive";
        if (value < 0) return "return-negative";
    
        return "return-neutral";
    }
    
    function getOutperformanceClass(value) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return "return-neutral";
        }
    
        // For outperformance multiple:
        // > 1 means AI strategy performed better than buy & hold
        // < 1 means AI strategy underperformed buy & hold
        if (value > 1) return "return-positive";
        if (value < 1) return "return-negative";
    
        return "return-neutral";
    }
    
    function formatSignal(signal) {
        if (signal === 1) {
            return `<span class="signal-badge signal-buy">▲ BUY</span>`;
        }
    
        if (signal === -1) {
            return `<span class="signal-badge signal-sell">▼ SELL</span>`;
        }
    
        return `<span class="signal-badge signal-hold">— HOLD</span>`;
    }
    
    function formatPercent(value) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return `<span class="return-value return-neutral">—</span>`;
        }
    
        const percent = value * 100;
        const sign = percent > 0 ? "+" : "";
    
        return `
            <span class="return-value ${getReturnClass(value)}">
                ${sign}${percent.toFixed(1)}%
            </span>
        `;
    }
    
    function formatMultiple(value) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return `<span class="return-value return-neutral">—</span>`;
        }
    
        return `
            <span class="return-value ${getOutperformanceClass(value)}">
                ${value.toFixed(2)}×

        id: "signalMarkerPlugin",
        afterDatasetsDraw(chart) {
    
            const { ctx } = chart;
    
            chart.data.datasets.forEach((dataset, datasetIndex) => {
    
                if (!dataset.isSignal) return;
    
                const meta = chart.getDatasetMeta(datasetIndex);
    
                meta.data.forEach(point => {
    
                    if (!point || point.skip) return;
    
                    const x = point.x;
                    const y = point.y;
    
                    const offset = dataset.offsetPx || 0;
    
                    ctx.save();
    
                    ctx.translate(x, y + offset);
    
                    ctx.beginPath();
    
                    if (dataset.direction === "buy") {
                        // Up triangle
                        ctx.moveTo(0, -8);
                        ctx.lineTo(6, 6);
                        ctx.lineTo(-6, 6);
                    } else {
                        // Down triangle
                        ctx.moveTo(0, 8);
                        ctx.lineTo(6, -6);
                        ctx.lineTo(-6, -6);
                    }
    
                    ctx.closePath();
                    ctx.fillStyle = dataset.color;
                    ctx.fill();
    
                    ctx.restore();
                });
            });
        }
    };

    async function liveSimFetchJSON(url, options = {}) {
        const response = await fetch(url, options);
        const text = await response.text();
    
        let data = null;
    
        try {
            data = JSON.parse(text);
        } catch (e) {
            throw new Error(`Unexpected server response (${response.status}).`);
        }
    
        if (!response.ok) {
            throw new Error(data.error || `Request failed (${response.status}).`);
        }
    
        return data;
    }
    
    async function loadLiveSimulations() {
        const listEl = document.getElementById("live-sim-list");
        const limitEl = document.getElementById("live-sim-limit");
        const refreshBtn = document.getElementById("live-sim-refresh-btn");
    
        if (!listEl || !limitEl) return;
    
        if (refreshBtn) {
            refreshBtn.disabled = true;
            refreshBtn.textContent = "Refreshing...";
        }
    
        setLiveSimRefreshStatus("Checking latest saved simulations...");
    
        try {
            const data = await liveSimFetchJSON("/live-simulations");

            liveSimulationsCache = data.simulations || [];
            
            limitEl.textContent = `${data.count} of ${data.limit} simulations used.`;
            
            renderLiveSimulationList(liveSimulationsCache);
    
            if (data.simulations && data.simulations.length > 0) {
                const selectedExists = data.simulations.some(sim => sim.id === selectedLiveSimulationId);
                const targetId = selectedExists ? selectedLiveSimulationId : data.simulations[0].id;
                await selectLiveSimulation(targetId);
            } else {
                document.getElementById("live-sim-dashboard").style.display = "none";
            }

            setLiveSimRefreshStatus(`Last refreshed at ${liveSimRefreshTimestamp()}.`);
    
        } catch (error) {
            if (isLiveSimLoginError(error)) {
                renderLiveSimulationLoggedOutState();
                setLiveSimMessage("Log in or sign up to create and save live simulations.");
                setLiveSimRefreshStatus("Login required to load saved simulations.");
            } else {
                limitEl.textContent = "Could not load simulations.";
                listEl.innerHTML = "";
                setLiveSimMessage(error.message, true);
                setLiveSimRefreshStatus("Could not refresh simulations.");
            }
        
        } finally {
            if (refreshBtn) {
                refreshBtn.disabled = false;
                refreshBtn.textContent = "Refresh";
            }
        }
    }
    
    function renderLiveSimulationList(simulations) {

        if (!listEl) return;
    
        if (!simulations.length) {
            listEl.innerHTML = `
                <div class="nt-live-sim-small-note">
                    No live simulations yet. Create your first one above.
                </div>
            `;
            return;
        }
    
        listEl.innerHTML = simulations.map(sim => {
            const activeClass = sim.id === selectedLiveSimulationId ? "active" : "";
            const createdClass = sim.id === recentlyCreatedLiveSimulationId ? "just-created" : "";
    
            const strategyReturnClass = liveSimReturnClass(sim.strategy_return);
            const benchmarkReturnClass = liveSimReturnClass(sim.benchmark_return);
    
            const alphaValue = liveSimAlphaValue(sim);
            const alphaClass = liveSimAlphaClass(alphaValue);
            const alphaLabel = liveSimAlphaLabel(sim);
    
            const latestDate = sim.latest_equity_date || sim.last_processed_date || "—";
    
            return `
                <div class="nt-live-sim-item ${activeClass} ${createdClass}" data-live-sim-id="${sim.id}">
                    <div class="nt-live-sim-item-top">
                        <div>
                            <div class="nt-live-sim-item-name">${escapeHTML(sim.name)}</div>
                            <div class="nt-live-sim-item-meta">
                                ${escapeHTML(sim.ticker)} · ${Number(sim.position_size_pct).toFixed(0)}% per signal · ${escapeHTML(sim.asset_type || "")}
                            </div>
                            
                            ${liveSimLatestSignalHTML(sim)}
                            
                            ${liveSimCsvStatusHTML(sim)}
                        </div>
    
                        <button 
                            type="button" 
                            class="nt-live-sim-delete" 
                            data-delete-live-sim-id="${sim.id}"
                        >
                            Delete
                        </button>
                    </div>
    
                    <div class="nt-live-sim-card-metrics">
                        <div class="nt-live-sim-card-metric">
                            <div class="nt-live-sim-card-metric-label">
                                Strategy
                            </div>
                            <div class="nt-live-sim-card-metric-value">
                                ${liveSimMoney(sim.latest_strategy_value)}
                            </div>
                            <div class="nt-live-sim-item-meta ${strategyReturnClass}">
                                ${liveSimPercent(sim.strategy_return)}
                            </div>
                        </div>
    
                        <div class="nt-live-sim-card-metric">
                            <div class="nt-live-sim-card-metric-label">
                                Buy & Hold
                            </div>
                            <div class="nt-live-sim-card-metric-value">
                                ${liveSimMoney(sim.latest_benchmark_value)}
                            </div>
                            <div class="nt-live-sim-item-meta ${benchmarkReturnClass}">
                                ${liveSimPercent(sim.benchmark_return)}
                            </div>
                        </div>
                    </div>
    
                    <div class="nt-live-sim-card-footer">
                        <div class="nt-live-sim-card-updated">
                            Updated: ${escapeHTML(latestDate)}
                        </div>
    
                        <div class="nt-live-sim-alpha-pill ${alphaClass}">
                            ${alphaLabel}
                        </div>
                    </div>
                </div>
            `;
        }).join("");
    
        document.querySelectorAll("[data-live-sim-id]").forEach(card => {
            card.addEventListener("click", function () {
                const simId = Number(this.dataset.liveSimId);
                selectLiveSimulation(simId);
            });
        });
    
        document.querySelectorAll("[data-delete-live-sim-id]").forEach(btn => {
            btn.addEventListener("click", async function (e) {
                e.stopPropagation();
    
                const simId = Number(this.dataset.deleteLiveSimId);
                const ok = confirm("Delete this live simulation?");
    
                if (!ok) return;
    
                try {
                    await liveSimFetchJSON(`/live-simulations/${simId}`, {
                        method: "DELETE"
                    });
    
                    if (selectedLiveSimulationId === simId) {
                        selectedLiveSimulationId = null;
                    }
    
                    await loadLiveSimulations();
    
                } catch (error) {
                    setLiveSimMessage(error.message, true);
                }
            });
        });

        scrollToRecentlyCreatedSimulation();
    }
    
    async function selectLiveSimulation(simId) {
        selectedLiveSimulationId = simId;
    
        try {
            const data = await liveSimFetchJSON(`/live-simulations/${simId}`);
            renderLiveSimulationDetail(data.simulation);
    
            document.querySelectorAll(".nt-live-sim-item").forEach(card => {
                card.classList.toggle(
                    "active",
                    Number(card.dataset.liveSimId) === simId
                );
            });
    
        } catch (error) {
            setLiveSimMessage(error.message, true);
        }
    }
    
    function renderLiveSimulationDetail(sim) {
        const dashboard = document.getElementById("live-sim-dashboard");
        if (!dashboard) return;
    
        dashboard.style.display = "block";
    
        document.getElementById("live-sim-detail-title").textContent =

        document.getElementById("live-sim-detail-subtitle").textContent =

        const detailSignalWrap = document.getElementById("live-sim-detail-signal-wrap");
            if (detailSignalWrap) {
                detailSignalWrap.innerHTML = liveSimLatestSignalHTML(sim);
            }

        const benchmarkReturnEl = document.getElementById("live-sim-benchmark-return");
        benchmarkReturnEl.textContent = `Return: ${liveSimPercent(sim.benchmark_return)} · entry cost included`;
        benchmarkReturnEl.className = `nt-live-sim-metric-sub ${liveSimReturnClass(sim.benchmark_return)}`;

    function renderLiveSimulationChart(sim) {
        const canvas = document.getElementById("live-sim-chart");
        if (!canvas) return;
    
        const ctx = canvas.getContext("2d");
    
        if (liveSimChart) {
            liveSimChart.destroy();
        }
    
        const colors = typeof NT_COLORS !== "undefined"
            ? NT_COLORS
            : {
                chartAI: "#2563EB",
                chartBuyHold: "#9333EA"
            };
    
        liveSimChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: sim.dates || [],
                datasets: [
                    {
                        label: `${sim.ticker} Live Strategy`,
                        data: sim.strategy_curve || [],
                        borderColor: colors.chartAI,
                        backgroundColor: colors.chartAI,
                        pointRadius: 2,
                        borderWidth: 2,
                        fill: false
                    },
                    {
                        label: `${sim.ticker} Buy & Hold`,
                        data: sim.benchmark_curve || [],
                        borderColor: colors.chartBuyHold,
                        backgroundColor: colors.chartBuyHold,
                        borderDash: [5, 5],
                        pointRadius: 2,
                        borderWidth: 2,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            usePointStyle: true
                        }
                    }
                },

                    x: {
                        display: true,
                        title: {

    function renderLiveSimulationTrades(trades) {
        const table = document.getElementById("live-sim-trades-table");
        if (!table) return;
    
        if (!trades.length) {
            table.innerHTML = `
                <div class="nt-live-sim-small-note">
                    No BUY/SELL trades yet. HOLD days do not create trades.
                </div>
            `;
            return;
        }
    
        table.innerHTML = `
            <div class="nt-live-trade-row header">
                <div>Date</div>
                <div>Signal</div>
                <div>Price</div>
                <div>Quantity</div>
                <div>Cost</div>
                <div>Cash After</div>
            </div>
    
            ${trades.slice().reverse().map(trade => {
                const signalText = trade.signal === 1 ? "BUY" : "SELL";
                const signalClass = trade.signal === 1 ? "nt-live-trade-buy" : "nt-live-trade-sell";
    
                return `
                    <div class="nt-live-trade-row">
                        <div>${escapeHTML(trade.trade_date)}</div>
                        <div class="${signalClass}">${signalText}</div>
                        <div>${liveSimMoney(trade.price)}</div>
                        <div>${Number(trade.quantity).toLocaleString(undefined, {
                            maximumFractionDigits: 8
                        })}</div>
                        <div>${liveSimMoney(trade.transaction_cost)}</div>
                        <div>${liveSimMoney(trade.cash_after)}</div>
                    </div>
                `;
            }).join("")}
        `;
    }

    function normalizeLiveSimTickerForCompare(ticker) {
        return String(ticker || "").trim().toUpperCase();
    }
    
    function findDuplicateLiveSimulation(payload) {
        const ticker = normalizeLiveSimTickerForCompare(payload.ticker);
        const positionSize = Number(payload.position_size_pct);
        const initialCash = Number(payload.initial_cash);
    
        return liveSimulationsCache.find(sim => {
            const sameTicker =
                normalizeLiveSimTickerForCompare(sim.ticker) === ticker;
    
            const samePosition =
                Number(sim.position_size_pct) === positionSize;
    
            const sameCash =
                Number(sim.initial_cash) === initialCash;
    
            return sameTicker && samePosition && sameCash;
        });
    }
    
    function findSimilarLiveSimulation(payload) {
        const ticker = normalizeLiveSimTickerForCompare(payload.ticker);
        const positionSize = Number(payload.position_size_pct);
    
        return liveSimulationsCache.find(sim => {
            const sameTicker =
                normalizeLiveSimTickerForCompare(sim.ticker) === ticker;
    
            const samePosition =
                Number(sim.position_size_pct) === positionSize;
    
            return sameTicker && samePosition;
        });
    }

    function liveSimAlphaValue(sim) {
        const strategy = Number(sim.latest_strategy_value);
        const benchmark = Number(sim.latest_benchmark_value);
    
        if (Number.isNaN(strategy) || Number.isNaN(benchmark)) {
            return null;
        }
    
        return strategy - benchmark;
    }
    
    function liveSimAlphaPercent(sim) {
        const strategy = Number(sim.latest_strategy_value);
        const benchmark = Number(sim.latest_benchmark_value);
    
        if (Number.isNaN(strategy) || Number.isNaN(benchmark) || benchmark === 0) {
            return null;
        }
    
        return (strategy / benchmark) - 1;
    }
    
    function liveSimAlphaClass(value) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) {
            return "neutral";
        }
    
        if (Number(value) > 0) return "positive";
        if (Number(value) < 0) return "negative";
        return "neutral";
    }
    
    function liveSimAlphaLabel(sim) {
        const alphaValue = liveSimAlphaValue(sim);
        const alphaPct = liveSimAlphaPercent(sim);
    
        if (alphaValue === null || alphaPct === null) {
            return "Vs B&H: —";
        }
    
        const sign = alphaValue > 0 ? "+" : "";
    
        return `Vs B&H: ${sign}${liveSimMoney(alphaValue)} (${liveSimPercent(alphaPct)})`;
    }

    function setLiveSimRefreshStatus(message) {
        const el = document.getElementById("live-sim-refresh-status");
        if (!el) return;
    
        el.textContent = message;
    }
    
    function liveSimRefreshTimestamp() {
        const now = new Date();
    
        return now.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function liveSimCsvStatusHTML(sim) {
        const isCurrent = Boolean(sim.is_current_with_csv);
        const statusClass = isCurrent ? "current" : "stale";
    
        const latestCsvDate = sim.latest_csv_date || "—";
        const processedDate = sim.last_processed_date || sim.latest_equity_date || "—";
    
        const label = isCurrent
            ? `CSV current · through ${latestCsvDate}`
            : `Needs refresh · processed ${processedDate}, CSV ${latestCsvDate}`;
    
        return `
            <div class="nt-live-sim-csv-status ${statusClass}">
                <span class="nt-live-sim-csv-dot"></span>
                <span>${escapeHTML(label)}</span>
            </div>
        `;
    }

    function liveSimSignalInfo(signal) {
        const value = Number(signal);
    
        if (value === 1) {
            return {
                label: "BUY",
                className: "buy"
            };
        }
    
        if (value === -1) {
            return {
                label: "SELL",
                className: "sell"
            };
        }
    
        if (value === 0) {
            return {
                label: "HOLD",
                className: "hold"
            };
        }
    
        return {
            label: "—",
            className: "unknown"
        };
    }
    
    function liveSimSignalBadgeHTML(signal) {
        const info = liveSimSignalInfo(signal);
    
        return `
            <span class="nt-live-sim-signal-badge ${info.className}">
                ${info.label}
            </span>
        `;
    }
    
    function liveSimLatestSignalHTML(sim) {
        const closePrice = sim.latest_close_price
            ? liveSimMoney(sim.latest_close_price)
            : "—";
    
        const signalDate =
            sim.latest_equity_date ||
            sim.last_processed_date ||
            "—";
    
        return `
            <div class="nt-live-sim-signal-row">
                ${liveSimSignalBadgeHTML(sim.latest_signal)}
                <span class="nt-live-sim-signal-price">
                    Latest signal · ${escapeHTML(signalDate)} · Close ${closePrice}
                </span>
            </div>
        `;
    }

    function scrollToRecentlyCreatedSimulation() {
        if (!recentlyCreatedLiveSimulationId) return;
    
        const card = document.querySelector(
            `[data-live-sim-id="${recentlyCreatedLiveSimulationId}"]`
        );
    
        if (!card) return;
    
        card.scrollIntoView({
            behavior: "smooth",
            block: "nearest"
        });
    
        setTimeout(() => {
            card.classList.remove("just-created");
            recentlyCreatedLiveSimulationId = null;
        }, 2200);
    }

    function openNeuralTrendLoginModal() {
        const loginModal = document.getElementById("loginModal");
        const emailInput = document.getElementById("emailInput");
    
        if (!loginModal) return;
    
        loginModal.style.display = "flex";
    
        requestAnimationFrame(() => {
            loginModal.style.opacity = "1";
        });
    
        if (emailInput) {
            setTimeout(() => emailInput.focus(), 120);
        }
    }
    
    function isLiveSimLoginError(error) {
        const message = String(error?.message || "").toLowerCase();
    
        return (
            message.includes("login required") ||
            message.includes("401") ||
            message.includes("unauthorized")
        );
    }
    
    function renderLiveSimulationLoggedOutState() {
        const listEl = document.getElementById("live-sim-list");
        const limitEl = document.getElementById("live-sim-limit");
        const dashboard = document.getElementById("live-sim-dashboard");
    
        liveSimulationsCache = [];
        selectedLiveSimulationId = null;
    
        if (limitEl) {
            limitEl.textContent = "Sign in to save and track live simulations.";
        }
    
        if (dashboard) {
            dashboard.style.display = "none";
        }
    
        if (!listEl) return;
    
        listEl.innerHTML = `
            <div class="nt-live-sim-auth-empty">
                <div class="nt-live-sim-auth-kicker">
                    Account required
                </div>
    
                <div class="nt-live-sim-auth-title">
                    Log in to create live paper simulations
                </div>
    
                <div class="nt-live-sim-auth-text">
                    Your live simulations are saved to your account, so each portfolio can keep its own cash balance, position size, trades, equity curve, and buy-and-hold benchmark.
                </div>
    
                <div class="nt-live-sim-auth-actions">
                    <button 
                        type="button" 
                        id="live-sim-login-action" 
                        class="nt-live-sim-auth-btn"
                    >
                        Log in / Sign up
                    </button>
    
                    <span class="nt-live-sim-auth-note">
                        Paper simulation only. No trades are placed.
                    </span>
                </div>
            </div>
        `;
    }

    function applyLiveSimAuthState(isLoggedIn, email = null) {
        liveSimLoggedIn = Boolean(isLoggedIn);
        liveSimUserEmail = email || null;
    
        const submitBtn = document.getElementById("live-sim-submit-btn");
    
        if (submitBtn) {
            submitBtn.textContent = liveSimLoggedIn
                ? "Create Simulation"
                : "Log in to Create";
        }
    
        const messageEl = document.getElementById("live-sim-message");
    
        if (messageEl && !messageEl.dataset.userEdited) {
            messageEl.textContent = liveSimLoggedIn
                ? `Signed in as ${liveSimUserEmail}. Simulations are saved to your account.`
                : "Login is required to create and track live simulations.";
    
            messageEl.style.color = "var(--nt-neutral)";
        }
    }
    
    async function refreshLiveSimAuthState() {
        try {
            const response = await fetch("/me", {
                cache: "no-store"
            });
    
            const data = await response.json();
    
            if (data && data.email) {
                applyLiveSimAuthState(true, data.email);
                return true;
            }
    
            applyLiveSimAuthState(false, null);
            return false;
    
        } catch (error) {
            applyLiveSimAuthState(false, null);
            return false;
        }
    }
    
    document.getElementById("live-sim-form")?.addEventListener("submit", async function (e) {
        e.preventDefault();
    
        const isLoggedInNow = await refreshLiveSimAuthState();
    
        if (!isLoggedInNow) {
            renderLiveSimulationLoggedOutState();
            setLiveSimMessage("Please log in or sign up before creating a live simulation.", true);
            openNeuralTrendLoginModal();
            return;
        }
    
        const payload = {
            name: document.getElementById("live-sim-name").value.trim(),
            ticker: document.getElementById("live-sim-ticker").value.trim(),
            initial_cash: Number(document.getElementById("live-sim-cash").value),
            position_size_pct: Number(document.getElementById("live-sim-position").value)
        };
    
        const duplicate = findDuplicateLiveSimulation(payload);
    
        if (duplicate) {
            const ok = confirm(
                `You already have an identical simulation:\n\n` +
                `${duplicate.name}\n` +
                `${duplicate.ticker} · ${Number(duplicate.position_size_pct).toFixed(0)}% · ${liveSimMoney(duplicate.initial_cash)}\n\n` +
                `Create another one anyway?`
            );
    
            if (!ok) {
                setLiveSimMessage("Simulation creation cancelled. Existing simulation kept.");
                return;
            }
        } else {
            const similar = findSimilarLiveSimulation(payload);
    
            if (similar) {
                const ok = confirm(
                    `You already have a similar simulation:\n\n` +
                    `${similar.name}\n` +
                    `${similar.ticker} · ${Number(similar.position_size_pct).toFixed(0)}% position size\n\n` +
                    `The new one has a different initial cash or name. Create it anyway?`
                );
    
                if (!ok) {
                    setLiveSimMessage("Simulation creation cancelled. Existing simulation kept.");
                    return;
                }
            }
        }
    
        setLiveSimMessage("Creating simulation...");
    
        try {
            const data = await liveSimFetchJSON("/live-simulations", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            selectedLiveSimulationId = data.simulation.id;
            recentlyCreatedLiveSimulationId = data.simulation.id;
            
            setLiveSimMessage("Simulation created successfully. New card highlighted below.");
            
            await loadLiveSimulations();
    
        } catch (error) {
            if (isLiveSimLoginError(error)) {
                renderLiveSimulationLoggedOutState();
                setLiveSimMessage("Please log in or sign up before creating a live simulation.", true);
                openNeuralTrendLoginModal();
            } else {
                setLiveSimMessage(error.message, true);
            }
        }
    });

    document.getElementById("live-sim-position")?.addEventListener("change", function () {
        const tickerInput = document.getElementById("live-sim-ticker");
        const nameInput = document.getElementById("live-sim-name");
    
        if (!tickerInput || !nameInput) return;
    
        if (nameInput.dataset.autoName === "true" || nameInput.value.includes("Live Simulation")) {
            nameInput.value = defaultLiveSimulationName(tickerInput.value || "BTC-USD");
            nameInput.dataset.autoName = "true";
        }
    });

    document.getElementById("live-sim-name")?.addEventListener("input", function () {
        this.dataset.autoName = "false";
    });

    document.getElementById("live-sim-use-selected-btn")?.addEventListener("click", function () {
        const selectedTicker =
            currentTicker ||
            document.getElementById("metric-selected-ticker")?.textContent ||
            "BTC-USD";
    
        syncLiveSimulationTicker(selectedTicker);
    
        setLiveSimMessage(`Using ${selectedTicker} for the new simulation.`);
    });

    document.getElementById("live-sim-ticker")?.addEventListener("input", function () {
        const selectedTickerLabel = document.getElementById("live-sim-selected-ticker-label");
    
        if (selectedTickerLabel) {
            selectedTickerLabel.textContent = this.value.trim() || "—";
        }
    });

    document.getElementById("live-sim-refresh-btn")?.addEventListener("click", async function () {
        setLiveSimMessage("Refreshing simulations from latest available CSV data...");
        await loadLiveSimulations();
        setLiveSimMessage("Simulations refreshed.");
    });

    document.addEventListener("click", function (e) {
        if (e.target && e.target.id === "live-sim-login-action") {
            e.preventDefault();
            openNeuralTrendLoginModal();
        }
    });
    
    // Auto-load saved simulations when page loads.
    syncLiveSimulationTicker(currentTicker || "BTC-USD");
    refreshLiveSimAuthState();
    loadLiveSimulations();
    
    // Global delegated click handler
    document.addEventListener("click", function (e) {

        const btn = e.target.closest("#scale-toggle-btn");
    
        if (!btn) return;
        if (!previewChart) return;
    
        isLogScale = !isLogScale;
    
        btn.innerText = isLogScale
            ? "Normal Scale"
            : "Log Scale";
    
        const previewScaleModeEl = document.getElementById("preview-scale-mode");
        if (previewScaleModeEl) {
            previewScaleModeEl.textContent = isLogScale ? "Log" : "Linear";
        }
    
        previewChart.options.scales.y.type =
            isLogScale ? "logarithmic" : "linear";
    
        previewChart.update();
    });

    document.addEventListener("click", function (e) {

        const btn = e.target.closest("#backtest-scale-toggle-btn");
    
        if (!btn) return;
    
        const chart =
            window.equityChart ||
            (typeof equityChart !== "undefined" ? equityChart : null);
    
        if (!chart) return;
    
        window.backtestLogScale = !window.backtestLogScale;
    
        btn.innerText = window.backtestLogScale
            ? "Normal Scale"
            : "Log Scale";
    
        const scaleModeEl = document.getElementById("backtest-scale-mode");
        if (scaleModeEl) {
            scaleModeEl.textContent = window.backtestLogScale ? "Log" : "Linear";
        }
    
        chart.options.scales.y.type =
            window.backtestLogScale ? "logarithmic" : "linear";
    
        chart.update();
    });
    
    // Load default ticker
    setTimeout(() => {
        loadTicker("BTC-USD");
    }, 200);
        
    </script>
    
    <script>
    function showModal(message, iconHTML) {
        const modal = document.getElementById("customModal");
        const modalMessage = document.getElementById("modal-message");
        const modalIcon = document.getElementById("modal-icon");
    
        modalMessage.textContent = message;
        modalIcon.innerHTML = iconHTML || "";
    
        modal.classList.add("show");
    
        // Auto-close after 3 seconds with fade-out
        setTimeout(() => {
            modal.classList.remove("show");
            setTimeout(() => {
                modal.style.display = "none";
            }, 400); // match transition time
        }, 3000);
    
        modal.style.display = "block";
    }
    
    // Manual close
    const closeBtn = document.querySelector(".close-btn");
    if (closeBtn) {
        closeBtn.addEventListener("click", function () {
            const modal = document.getElementById("customModal");
            modal.classList.remove("show");
            setTimeout(() => modal.style.display = "none", 400);
        });
    }
    
    // Click outside to close
    window.addEventListener("click", function (event) {
        const modal = document.getElementById("customModal");
        if (event.target === modal) {
            modal.classList.remove("show");
            setTimeout(() => modal.style.display = "none", 400);
        }
    });
    
    // Form Validation
    
    const backtestForm = document.getElementById("backtest-form");
    if (backtestForm) {
        backtestForm.addEventListener("submit", function(event) {
            const startDate = new Date(document.getElementById("start").value);
            // const endDate = new Date(document.getElementById("end").value);
            const today = new Date();
            startDate.setHours(0,0,0,0);
            today.setHours(0,0,0,0);
        
            // if (startDate > endDate) {
            //     showModal("❌ Start Date cannot be after End Date.", "Error!");
            //     event.preventDefault();
            //     return;
            // }
        
            if (startDate >= today) {
                showModal("❌ Start Date cannot be in the future.", "Error!");
                event.preventDefault();
                return;
            }
        
            // If passes validation
            showModal("✅ Backtest started successfully!", "Success!");
        });
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        const startInput = document.getElementById("start");
    
        // 🔧 Set how many days before today should be the latest selectable
        const x = 0; // example: today - 2 days
    
        // Calculate (today - x days)
        const maxDateObj = new Date();
        maxDateObj.setDate(maxDateObj.getDate() - x);
    
        // Format to yyyy-mm-dd for input[type=date]
        const yyyy = maxDateObj.getFullYear();
        const mm = String(maxDateObj.getMonth() + 1).padStart(2, "0");
        const dd = String(maxDateObj.getDate()).padStart(2, "0");
    
        const maxDate = `${yyyy}-${mm}-${dd}`;
    
        // Apply restriction
        startInput.setAttribute("max", maxDate);
        // setLoggedOut();
    });

    /* ===============================
       Model tab behavior
    ================================ */
    
    function setActiveModelPanel(panelId) {
        const targetPanel = document.getElementById(panelId);
        if (!targetPanel) return;
    
        document.querySelectorAll(".nt-model-tab").forEach(tab => {
            const isActive = tab.dataset.modelTarget === panelId;
            tab.classList.toggle("active", isActive);
            tab.setAttribute("aria-selected", isActive ? "true" : "false");
        });
    
        document.querySelectorAll(".nt-model-panel").forEach(panel => {
            panel.classList.toggle("nt-model-panel-active", panel.id === panelId);
        });
    }
    
    document.querySelectorAll(".nt-model-tab").forEach(tab => {
        tab.addEventListener("click", function () {
            const panelId = this.dataset.modelTarget;
            setActiveModelPanel(panelId);
        });
    });
    
    // Default active model
    setActiveModelPanel("epochsignaler-section");
        
    </script>

    <script>
    // const loginBtn = document.getElementById("login-btn");
    const loginModal = document.getElementById("loginModal"); // FIXED
    const closeModal = document.querySelector(".close-btn");
    
    const signupBtn = document.getElementById("signupBtn");
    const signinBtn = document.getElementById("signinBtn");
    
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    
    const authMessage = document.getElementById("authMessage");
    const userArea = document.getElementById("user-area");
    
    // ------------------
    // Close modal
    // ------------------
    closeModal.addEventListener("click", function() {
        loginModal.style.opacity = "0";
        setTimeout(() => {
            loginModal.style.display = "none";
        }, 300);
    });
    
    window.addEventListener("click", function(e) {
        if (e.target === loginModal) {
            loginModal.style.opacity = "0";
            setTimeout(() => {
                loginModal.style.display = "none";
            }, 300);
        }
    });

    signupBtn.addEventListener("click", async function() {
        const response = await fetch("/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: emailInput.value.trim(),
                password: passwordInput.value
            })
        });
    
        const data = await response.json();
    
        if (data.message) {
            authMessage.innerText = "Check your email to verify your account.";
    
            // Close modal after short delay (better UX)
            setTimeout(() => {
                loginModal.style.opacity = "0";
                setTimeout(() => {
                    loginModal.style.display = "none";
                }, 300);
            }, 1500);
    
        } else {
            authMessage.innerText = data.error;
        }
    });
    
    // ------------------
    // Login
    // ------------------
    signinBtn.addEventListener("click", async function() {
        const email = emailInput.value;
        const password = passwordInput.value;
    
        const response = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: emailInput.value.trim(),
                password: passwordInput.value
            })
        });
    
        const data = await response.json();
    
        if (data.message) {
            authMessage.innerText = data.message;
            loginModal.style.opacity = "0";
            setTimeout(() => {
                loginModal.style.display = "none";
            }, 300);
            await checkUser();

            if (typeof refreshLiveSimAuthState === "function") {
                await refreshLiveSimAuthState();
            }
            
            if (typeof loadLiveSimulations === "function") {
                await loadLiveSimulations();
            }
        } else {
            authMessage.innerText = data.error;
        }
    });
    
    // ------------------
    // Logout
    // ------------------
    async function logout() {
        await fetch("/logout", {
            method: "POST"
        });
    
        userArea.innerHTML = `<a href="#" id="login-btn">Login</a>`;
        location.reload();
    }

    // ------------------
    // Password Reset
    // ------------------
    document.addEventListener("click", async function(e) {
        if (e.target && e.target.id === "forgot-password") {
            e.preventDefault();
    
            const email = prompt("Enter your email:");
            if (!email) return;
    
            const res = await fetch("/request-password-reset", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ email })
            });
    
            const data = await res.json();
            alert(data.message);
        }
    });

    // ------------------
    // Delete Account
    // ------------------
    async function deleteAccount() {
        const confirmDelete = confirm("Are you sure you want to permanently delete your account?");
    
        if (!confirmDelete) return;
    
        const response = await fetch("/request-delete-account", {
            method: "POST"
        });
    
        const data = await response.json();
    
        alert(data.message);
    }
    
    // ------------------
    // Check current user
    // ------------------
    async function checkUser() {
        const response = await fetch("/me");
        const data = await response.json();
    
        if (data.email) {
            userArea.innerHTML = `
                <div class="user-menu" id="userMenu">
                    <div class="user-pill">
                        ${data.email}
                        <span class="arrow">▼</span>
                    </div>
            
                    <div class="dropdown" id="dropdownMenu" style="display:none;">
                        <div onclick="logout()">Logout</div>
                        <div onclick="deleteAccount()" style="color:red;">Delete Account</div>
                    </div>
                </div>
            `;
        } else {
            // 🔑 reset to login button if not authenticated
            userArea.innerHTML = `<a href="#" id="login-btn">Login</a>`;
        }
    }
    
    document.addEventListener("click", function(e) {
    
        // ✅ Handle Login button (works even after re-render)
        if (e.target && e.target.id === "login-btn") {
            e.preventDefault();
            loginModal.style.display = "flex";
            loginModal.style.opacity = "1";
            return;
        }
    
        // ✅ Dropdown logic
        const menu = document.getElementById("userMenu");
        const dropdown = document.getElementById("dropdownMenu");
    
        if (!menu || !dropdown) return;
    
        const pill = menu.querySelector(".user-pill");
    
        if (pill && pill.contains(e.target)) {
            dropdown.style.display =
                dropdown.style.display === "block" ? "none" : "block";
        } else {
            dropdown.style.display = "none";
        }
    });
    
    // Run on page load
    checkUser();
    </script>
