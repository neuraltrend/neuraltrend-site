<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9633315289535323"
     crossorigin="anonymous"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>NeuralTrend</title>
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Plotly CDN (include once per page, ideally in <head>) -->
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    
    <style>
        :root {
            --nav-height: 110px; /* adjust if needed */
        
            --nt-positive: #16A34A;       /* green */
            --nt-negative: #DC2626;       /* red */
            --nt-neutral: #64748B;        /* slate gray */
            --nt-dark: #0F172A;
            --nt-blue: #2563EB;
            --nt-purple: #9333EA;
            --nt-selected-row: #EAF6FF;
            --nt-row-hover: #F8FAFC;
            --nt-border: #E2E8F0;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            font-size: 18px;
        }

        /* Navbar container */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a7d9c;
            padding: 10px 30px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            z-index: 1000;
        }

        /* Logo styling */
        .navbar .logo img {
            height: 100px;
        }

        /* Links container */
        .navbar .nav-links {
            display: flex;
        }

        /* Links styling */
        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            margin-left: 5px;
            font-size: 16px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        /* Hover effect */
        .navbar .nav-links a:hover {
            background-color: #575757;
        }
        

        .user-menu {
            position: relative;
            cursor: pointer;
        }

        /* User pill */
        .user-pill {
            background: white;
            color: #1a7d9c;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        
        .user-pill:hover {
            background: #f0f0f0;
        }
        
        /* Arrow */
        .user-pill .arrow {
            font-size: 10px;
        }
        
        /* Dropdown */
        .dropdown {
            position: absolute;
            right: 0;
            top: 120%;
            background: white;
            border-radius: 8px;
            min-width: 120px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        
        /* Dropdown item */
        .dropdown div {
            padding: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .dropdown div:hover {
            background: #f2f2f2;
        }

        /* Main content pushed down below navbar */
        main {
            padding-top: calc(var(--nav-height) + 20px);
            padding-left: 30px; /* added left padding */
        }

        .product-box {
            background-color: #f9f9f9; /* very light gray — you can use your own color */
            padding: 20px;
            border-radius: 8px; /* optional, for rounded edges */
            box-shadow: 0 0 10px rgba(0,0,0,0.05); /* optional, soft shadow */
        }

        .three-blocks {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 20px;
        }

        .block {
            background-color: #f9f9f9; /* Light gray box */
            border-radius: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .block-title {
            background-color: #e3e3e3; /* Title background */
            padding: 10px;
            font-weight: bold;
            text-align: center;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .block-chart {
            flex: 1;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            min-height: 300px; /* adjust chart height */
        
            /* Center widget content */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .block-bottom {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .block-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }
                
        .tradingview-widget-copyright {
            font-size: 10px !important;       /* smaller font */
            color: #666 !important;           /* subtle gray color */
            text-align: center !important;    /* center the text */
            padding-top: 5px !important;      /* some spacing from widget */
            font-family: Arial, sans-serif !important;
            user-select: none;                /* prevent selection if you want */
            opacity: 0.7;                    /* slight transparency */
        }
        
        /* Make the form layout two rows: title row and inputs row */
        #backtest-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #signal-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* First row (title) */
        .trade-form h3 {
            margin: 0;
            text-align: center;
        }
        
        /* Second row (all inputs in one line) */
        .form-row {
            display: flex;
            flex-wrap: wrap; /* Wrap on smaller screens */
            gap: 10px;
            justify-content: center;
        }
        
        /* Make labels and inputs stay together */
        .form-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        
        /* Reduce input width so they fit in one line */
        .form-group input,
        .form-group select {
            width: 145px;
        }
        
        #backtest-form label {
            margin: 0 5px 0 0; /* small space after label */
        }

        #backtest-form input,
        #backtest-form select,
        #backtest-form button {
            margin: 0 10px 0 0;
        }
        
        #backtest-form button {
            white-space: nowrap; /* prevents breaking button text */
        }
        
        /* Make form labels bigger */
        label {
            font-size: 15px;
        }
        
        /* Make inputs bigger (both text & number/date selectors) */
        input, select, textarea, button {
            font-size: 15px;   /* text inside box */
            padding: 8px 10px; /* a bit more padding for comfort */
        }
        
        /* Make placeholder text bigger */
        input::placeholder, textarea::placeholder {
            font-size: 15px;
        }

        /* Optional: make the "Run Backtest" button match */
        button {
            font-size: 15px;
            padding: 10px 15px;
            cursor: pointer;
        }

        /* Results section */
        .results-section {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            margin: 20px auto;
            width: 90%;
            max-width: 1200px;
            border: 1px solid #e0e0e0;
        }
        #results p {
            color: #000000;
            font-size: 20px;
            line-height: 1.6;
        }

        /* Smooth fade transition */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: block;
            opacity: 1;
        }
    
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border: 1px solid #888;
            width: 300px;
            border-radius: 8px;
            text-align: center;
        }

        .close-btn {
            float: right;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Icons */
        #modal-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        .success-icon { color: #2ecc71; }
        .error-icon { color: #e74c3c; }

        /* Animation */
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        
        .close-btn:hover { color: #000; }

        /* Auth area container */
        .auth-area {
            display: flex;
            align-items: center;
        }
        
        /* Login button */
        #login-btn {
            background: white;
            color: #1a7d9c;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 2px solid white;
        }
        
        /* Hover effect */
        #login-btn:hover {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        #signupBtn, #signinBtn {
            margin-top: 15px;
        }

        #forgot-password {
            font-size: 12px;
            color: #777;
            text-align: center;
        }

        #forgot-password:hover {
            text-decoration: underline;
            color: #000;
        }

        /* Footer styling */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            background-color: #f2f2f2;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        
        .footer a {
            color: black;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        
        /* Layout for Contact + Follow Us */
        /* Main layout: Contact Us + Follow Us side by side */
        #contact-section {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto;
            flex-wrap: wrap; /* Makes it responsive on small screens */
        }
        
        /* Shared box styling */
        .contact-box, .follow-box {
            flex: 1;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            min-width: 300px; /* Prevents boxes from shrinking too much */
        }

        /* Headings */
        .contact-box h2, .follow-box h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        
        /* Contact form styles */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .contact-form label {
            font-weight: bold;
        }
        
        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        .contact-form textarea {
            resize: vertical;
            min-height: 100px;
        }

        .contact-form button {
            background-color: #0077B5;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .contact-form button:hover {
            background-color: #005f87;
        }
        
        /* Follow Us buttons */
        .social-btn {
            display: block;
            padding: 12px 15px;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .social-btn i {
            margin-right: 10px;
        }

        /* Brand colors */
        .social-btn.linkedin { background-color: #0077B5; }
        .social-btn.twitter { background-color: #1DA1F2; }
        .social-btn.facebook { background-color: #1877F2; }
        .social-btn.instagram { background-color: #E1306C; }
        
        
        /* Hover effect for Follow Us buttons */
        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* ===============================
           Optional centered main title only
        ================================ */
        
        .nt-page-header-center {
            text-align: center;
        }
        
        .nt-page-header-center .nt-page-title {
            text-align: center;
        }

        /* ===============================
           Consistent section title alignment
        ================================ */
        
        .nt-page-header {
            width: 100%;
            margin: 0 0 18px 0;
            text-align: left;
        }
        
        .nt-page-title {
            margin: 0;
            font-size: 22px;
            font-weight: 850;
            color: var(--nt-dark);
            text-align: left;
        }
        
        /* Override older centered form-title rules */
        .nt-backtest-section .nt-backtest-header {
            justify-content: flex-start;
            text-align: left;
            width: 100%;
        }
        
        .nt-backtest-section .nt-backtest-title {
            text-align: left !important;
        }
        
        .nt-backtest-section .trade-form h3 {
            text-align: left !important;
        }
        
        .nt-backtest-section #backtest-form {
            align-items: stretch !important;
        }
        
        .nt-backtest-section .form-row {
            justify-content: stretch !important;
        }

        /* ===============================
           Current view / active filters row
        ================================ */
        
        .nt-active-filter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
            margin: 12px 0 14px 0;
            padding: 11px 13px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
        }
        
        .nt-active-filter-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nt-active-filter-label {
            font-size: 12px;
            font-weight: 850;
            color: var(--nt-dark);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        
        .nt-active-filter-chips {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
        }
        
        .nt-active-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 9px;
            border-radius: 999px;
            background: #F8FAFC;
            border: 1px solid var(--nt-border);
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 750;
        }
        
        .nt-active-chip.chip-buy {
            color: var(--nt-positive);
            background: rgba(22, 163, 74, 0.08);
            border-color: rgba(22, 163, 74, 0.20);
        }
        
        .nt-active-chip.chip-sell {
            color: var(--nt-negative);
            background: rgba(220, 38, 38, 0.08);
            border-color: rgba(220, 38, 38, 0.20);
        }
        
        .nt-active-chip.chip-hold {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.08);
            border-color: rgba(100, 116, 139, 0.20);
        }
        
        .nt-active-clear-btn {
            border: none;
            background: transparent;
            color: var(--nt-blue);
            font-size: 12px;
            font-weight: 850;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 999px;
            transition: all 0.15s ease;
        }
        
        .nt-active-clear-btn:hover {
            background: rgba(37, 99, 235, 0.08);
        }
        
        @media (max-width: 700px) {
            .nt-active-filter-row {
                align-items: flex-start;
            }
        
            .nt-active-clear-btn {
                width: 100%;
                text-align: left;
            }
        }

        /* ===============================
           Backtest results cards
        ================================ */
        
        .nt-backtest-results {
            margin-top: 18px;
        }
        
        .nt-backtest-results-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }
        
        .nt-backtest-results-title {
            margin: 0;
            font-size: 18px;
            font-weight: 850;
            color: var(--nt-dark);
        }
        
        .nt-backtest-results-subtitle {
            margin: 4px 0 0 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-result-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }
        
        .nt-result-pill strong {
            color: var(--nt-dark);
        }
        
        .nt-backtest-results-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 16px;
        }
        
        .nt-result-card {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            padding: 15px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
        }
        
        .nt-result-label {
            font-size: 12px;
            font-weight: 800;
            color: var(--nt-neutral);
            margin-bottom: 7px;
        }
        
        .nt-result-value {
            font-size: 24px;
            font-weight: 850;
            color: var(--nt-dark);
            line-height: 1.1;
        }
        
        .nt-result-sub {
            margin-top: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-backtest-chart-card {
            margin-top: 14px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            padding: 14px;
        }
        
        .nt-backtest-chart-title {
            font-size: 14px;
            font-weight: 850;
            color: var(--nt-dark);
            margin-bottom: 10px;
        }
        
        .nt-backtest-chart-shell {
            height: 430px;
            width: 100%;
            position: relative;
        }
        
        @media (max-width: 900px) {
            .nt-backtest-results-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        
        @media (max-width: 600px) {
            .nt-backtest-results-header {
                flex-direction: column;
            }
        
            .nt-backtest-results-grid {
                grid-template-columns: 1fr;
            }
        
            .nt-backtest-chart-shell {
                height: 320px;
            }
        }

        /* ===============================
           Return horizon segmented buttons
        ================================ */
        
        .nt-period-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nt-period-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--nt-dark);
            white-space: nowrap;
        }
        
        .nt-period-pills {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: #F1F5F9;
            border: 1px solid var(--nt-border);
            border-radius: 999px;
        }
        
        .period-pill {
            border: none;
            background: transparent;
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 800;
            padding: 7px 11px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .period-pill:hover {
            background: #E2E8F0;
            color: var(--nt-dark);
        }
        
        .period-pill.active {
            background: var(--nt-blue);
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.25);
        }

        /* ===============================
           NeuralTrend color system
           Step 1: table + signal colors
        ================================ */
        
        /* Signal badges */
        .signal-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 68px;
            padding: 3px 9px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        
        .signal-buy {
            color: var(--nt-positive);
            background: rgba(22, 163, 74, 0.10);
            border: 1px solid rgba(22, 163, 74, 0.22);
        }
        
        .signal-sell {
            color: var(--nt-negative);
            background: rgba(220, 38, 38, 0.10);
            border: 1px solid rgba(220, 38, 38, 0.22);
        }
        
        .signal-hold {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.10);
            border: 1px solid rgba(100, 116, 139, 0.18);
        }
        
        /* Return values */
        .return-value {
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        
        .return-positive {
            color: var(--nt-positive);
        }
        
        .return-negative {
            color: var(--nt-negative);
        }
        
        .return-neutral {
            color: var(--nt-neutral);
        }
        
        /* Signal board rows */
        .signal-row {
            transition: background 0.15s ease;
        }
        
        .signal-row:hover {
            background: var(--nt-row-hover);
        }
        
        .signal-row.selected {
            background: var(--nt-selected-row);
        }
        
        .signal-ticker {
            font-weight: 700;
            color: var(--nt-dark);
        }
        
        .signal-cell-right {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        
        .signal-cell-left {
            text-align: left;
        }

        /* ===============================
           Asset type segmented buttons
        ================================ */
        
        .nt-asset-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nt-asset-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--nt-dark);
            white-space: nowrap;
        }
        
        .nt-asset-pills {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: #F1F5F9;
            border: 1px solid var(--nt-border);
            border-radius: 999px;
        }
        
        .asset-pill {
            border: none;
            background: transparent;
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 800;
            padding: 7px 12px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .asset-pill:hover {
            background: #E2E8F0;
            color: var(--nt-dark);
        }
        
        .asset-pill.active {
            background: var(--nt-dark);
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.22);
        }

        /* ===============================
           Signal table header filters
        ================================ */
        
        .nt-signal-table-card {
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
            background: #ffffff;
        }
        
        .nt-signal-header {
            display: grid;

    </div>

      <div class="modal-content">
    
        <span class="close-btn">&times;</span>

        <input type="email" id="emailInput" placeholder="Email">
        <input type="password" id="passwordInput" placeholder="Password">

            Forgot password?
        </a>

      </div>
    </div>

    <!-- ✅ SCRIPT -->
    <script>
    
    let equityChart = null;

    window.backtestLogScale = window.backtestLogScale || false;
        
    document.getElementById('backtest-form').addEventListener('submit', function(e) {
        e.preventDefault();
    
        const formData = new FormData(this);
        fetch('/backtest', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            renderResults(data);
        })
        .catch(error => console.error('Error:', error));
    });

    function formatBacktestCurrency(value) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return "—";
        }
    
        return "$" + Number(value).toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }
    
    function formatBacktestReturnFromFactor(factor) {
        if (factor === null || factor === undefined || Number.isNaN(factor)) {
            return `<span class="return-value return-neutral">—</span>`;
        }
    
        const returnValue = factor - 1;
        const percent = returnValue * 100;
        const sign = percent > 0 ? "+" : "";
    
        let cls = "return-neutral";
        if (returnValue > 0) cls = "return-positive";
        if (returnValue < 0) cls = "return-negative";
    
        return `
            <span class="return-value ${cls}">
                ${sign}${percent.toFixed(1)}%
            </span>
        `;
    }
    
    function formatBacktestNumber(value, decimals = 2) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return "—";
        }
    
        return Number(value).toFixed(decimals);
    }

    function renderResults({
        ticker, final_value, final_value_epoch, profit_factor, profit_factor_epoch, sharpe_ratio,
        position_size_pct = 100,
        equity_curve, epoch_equity_curve, dates,
        ticker_2, final_value_2, profit_factor_2, sharpe_ratio_2,
        equity_curve_2, buy_dates, buy_prices, sell_dates, sell_prices
    }) {
        const resultsDiv = document.getElementById('results');
    
        const aiReturnHTML = formatBacktestReturnFromFactor(profit_factor_epoch);
        const buyHoldReturnHTML = formatBacktestReturnFromFactor(profit_factor);
        
        resultsDiv.innerHTML = `
            <div class="nt-backtest-results">
        
                <div class="nt-backtest-results-header">
                    <div>
                        <div class="nt-section-eyebrow">Backtest Results</div>
                        <h3 class="nt-backtest-results-title">${ticker} Backtest Results</h3>
                        <p class="nt-backtest-results-subtitle">
                            AI strategy performance compared with buy & hold.
                        </p>
                    </div>
        
                    <span class="nt-result-pill">
                        Position Size: <strong>${formatBacktestNumber(position_size_pct, 0)}%</strong>
                    </span>
                </div>
        
                <div class="nt-backtest-results-grid">
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">AI Strategy Final Value</div>
                        <div class="nt-result-value">${formatBacktestCurrency(final_value_epoch)}</div>
                        <div class="nt-result-sub">EpochSignaler result</div>
                    </div>
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">Buy & Hold Final Value</div>
                        <div class="nt-result-value">${formatBacktestCurrency(final_value)}</div>
                        <div class="nt-result-sub">Benchmark result</div>
                    </div>
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">Sharpe Ratio</div>
                        <div class="nt-result-value">${formatBacktestNumber(sharpe_ratio, 2)}</div>
                        <div class="nt-result-sub">Based on selected period</div>
                    </div>
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">AI Strategy Return</div>
                        <div class="nt-result-value">${aiReturnHTML}</div>
                        <div class="nt-result-sub">Compared to initial cash</div>
                    </div>
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">Buy & Hold Return</div>
                        <div class="nt-result-value">${buyHoldReturnHTML}</div>
                        <div class="nt-result-sub">Compared to initial cash</div>
                    </div>
        
                    <div class="nt-result-card">
                        <div class="nt-result-label">Position Size</div>
                        <div class="nt-result-value">${formatBacktestNumber(position_size_pct, 0)}%</div>
                        <div class="nt-result-sub">Applied per BUY/SELL signal</div>
                    </div>
        
                </div>
        
                <div class="nt-backtest-chart-card">

                    <div class="nt-backtest-chart-header">
                        <div class="nt-backtest-chart-title">
                            Equity Curve: AI Strategy vs Buy & Hold
                        </div>
                
                        <div class="nt-backtest-chart-actions">
                            <span class="nt-result-pill">
                                Scale: 
                                <strong id="backtest-scale-mode">
                                    ${window.backtestLogScale ? "Log" : "Linear"}
                                </strong>
                            </span>
                
                            <button id="backtest-scale-toggle-btn" class="nt-scale-btn" type="button">
                                ${window.backtestLogScale ? "Normal Scale" : "Log Scale"}
                            </button>
                        </div>
                    </div>
                
                    <div class="nt-backtest-chart-shell">
                        <canvas id="equity-chart"></canvas>
                    </div>
                
                </div>
        
            </div>
        `;
    
        const ctx = document.getElementById('equity-chart').getContext('2d');
    
        // --- Compute dynamic offset for markers ---
        const equity_min = Math.min(...epoch_equity_curve);
        const equity_max = Math.max(...epoch_equity_curve);
        const offset = (equity_max - equity_min) * 0.04; // 4% of range
    
        const adjustedBuySignals = dates.map((d, i) => buy_dates.includes(d) ? epoch_equity_curve[i] - offset : null);
        const adjustedSellSignals = dates.map((d, i) => sell_dates.includes(d) ? epoch_equity_curve[i] + offset : null);
    
        const datasets = [
            {
                label: `${ticker} EpochSignaler Equity Curve`,
                data: epoch_equity_curve,
                borderColor: NT_COLORS.chartAI,
                backgroundColor: NT_COLORS.chartAI,
                pointStyle: 'line',
                pointRadius: 0,

    <script>
    /* ===============================
       1. HELPERS
    ================================ */
    
    let allSignals = [];
    let defaultOrder = [];
    let assetTypeFilter = "crypto";
    let isLogScale = false;

    const NT_COLORS = {
        positive: "#16A34A",
        negative: "#DC2626",
        neutral: "#64748B",
        dark: "#0F172A",
        chartAI: "#2563EB",
        chartBuyHold: "#9333EA",
        buy: "#16A34A",
        sell: "#DC2626"
    };
    
    let signalFilters = {
        today_signal: null,
        yesterday_signal: null,
        last_week_signal: null,
        last_month_signal: null
    };

    function clearSignalBoardFilters() {

        // Reset signal filter state
        signalFilters = {
            today_signal: null,
            yesterday_signal: null,
            last_week_signal: null,
            last_month_signal: null
        };
    
        // Reset signal filter dropdowns
        document.querySelectorAll(".signal-filter").forEach(select => {
            select.value = "";
            select.classList.remove("nt-filter-active");
        });
    
        // Reset search bar
        const searchInput = document.getElementById("ticker-search");
        if (searchInput) {
            searchInput.value = "";
            searchInput.blur();
        }
    
        // Reset sorting
        currentSort = {
            key: null,
            direction: 1
        };
    
        updateSortIndicators();
    
        // Reset asset type to Crypto
        assetTypeFilter = "crypto";
    
        const assetSelect = document.getElementById("asset-type-filter");
        if (assetSelect) {
            assetSelect.value = "crypto";
        }
    
        if (typeof syncAssetPills === "function") {
            syncAssetPills();
        }
    
        // Reset return horizon to 5Y
        const periodSelect = document.getElementById("period-select");
        const horizonChanged = periodSelect && periodSelect.value !== "5y";
    
        if (periodSelect) {
            periodSelect.value = "5y";
        }
    
        if (typeof syncPeriodPills === "function") {
            syncPeriodPills();
        }
    
        // If horizon changed, reload data for 5Y.
        // Otherwise, just reapply local filters.
        if (horizonChanged && periodSelect) {
            periodSelect.dispatchEvent(new Event("change", { bubbles: true }));
        } else {
            applyAllFilters();
        }
    }

    function escapeHTML(value) {
        return String(value).replace(/[&<>"']/g, function (char) {
            return {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[char];
        });
    }
    
    function plainSignalText(value) {
        if (value === 1) return "BUY";
        if (value === -1) return "SELL";
        return "HOLD";
    }
    
    function signalChipClass(value) {
        if (value === 1) return "chip-buy";
        if (value === -1) return "chip-sell";
        return "chip-hold";
    }
    
    function assetTypeLabel(value) {
        if (value === "all") return "All Assets";
        if (value === "crypto") return "Crypto";
        if (value === "stock") return "Stocks";
        return value;
    }
    
    function sortLabel(key) {
        if (key === "buy_hold_annual_return") return "Buy & Hold Return";
        if (key === "strategy_annual_return") return "AI Strategy Return";
        if (key === "outperformance") return "AI vs Buy & Hold";
        return "";
    }
    
    function updateActiveFilterChips(count) {
        const row = document.getElementById("active-filter-row");
        const chipsContainer = document.getElementById("active-filter-chips");
    
        if (!row || !chipsContainer) return;
    
        const chips = [];
    
        const duration = document.getElementById("period-select")?.value || "5y";
        chips.push({
            label: `Return Horizon: ${durationLabel(duration)}`,
            className: ""
        });
    
        chips.push({
            label: `Asset Type: ${assetTypeLabel(assetTypeFilter)}`,
            className: ""
        });
    
        const visibleCount = Number.isFinite(count) ? count : allSignals.length;
        chips.push({
            label: `Assets Shown: ${visibleCount}`,
            className: ""
        });
    
        const searchQuery = document.getElementById("ticker-search")?.value.trim();
        if (searchQuery) {
            chips.push({
                label: `Search: ${searchQuery}`,
                className: ""
            });
        }
    
        const signalLabels = {
            today_signal: "Today",
            yesterday_signal: "Yesterday",
            last_week_signal: "Last Week",
            last_month_signal: "Last Month"
        };
    
        Object.keys(signalFilters).forEach(key => {
            const value = signalFilters[key];
    
            if (value !== null) {
                chips.push({
                    label: `${signalLabels[key]}: ${plainSignalText(value)}`,
                    className: signalChipClass(value)
                });
            }
        });
    
        if (currentSort.key) {
            const direction = currentSort.direction === 1 ? "Ascending" : "Descending";
    
            chips.push({
                label: `Sort: ${sortLabel(currentSort.key)} (${direction})`,
                className: ""
            });
        }
    
        chipsContainer.innerHTML = chips.map(chip => `
            <span class="nt-active-chip ${chip.className}">
                ${escapeHTML(chip.label)}
            </span>
        `).join("");
    }

    function syncBacktestTicker(ticker) {
        const tickerSelect = document.getElementById("ticker");
        if (!tickerSelect || !ticker) return;
    
        const optionExists = Array.from(tickerSelect.options)
            .some(option => option.value === ticker);
    
        if (optionExists) {
            tickerSelect.value = ticker;
        }
    }
    
    function applyAllFilters() {
    
        let filtered = [...defaultOrder];
    
        // 1️⃣ Search filter
        const query = document.getElementById('ticker-search').value.toLowerCase();
        if (query) {
            filtered = filtered.filter(item =>
                item.ticker.toLowerCase().includes(query)
            );
        }
    
        // 2️⃣ Asset type filter
        if (assetTypeFilter !== "all") {
        
            filtered = filtered.filter(item => {
        
                const isCrypto = item.ticker.endsWith("-USD");
        
                if (assetTypeFilter === "crypto") return isCrypto;
                if (assetTypeFilter === "stock") return !isCrypto;
        
                return true;
            });
        }
    
        // 2️⃣ Signal filters (AND logic)
        Object.keys(signalFilters).forEach(key => {
            const val = signalFilters[key];
            if (val !== null) {
                filtered = filtered.filter(item => item[key] === val);
            }
        });
    
        // 3️⃣ Sorting
        if (currentSort.key) {
            filtered.sort((a, b) => {
                let valA = a[currentSort.key] ?? 0;
                let valB = b[currentSort.key] ?? 0;
                return (valA - valB) * currentSort.direction;
            });
        }

        allSignals = filtered;
        renderBoard(filtered);
        updateAssumptionsBar(filtered.length);
        updateActiveFilterChips(filtered.length);
    }
    
    function getReturnClass(value) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return "return-neutral";
        }
    
        if (value > 0) return "return-positive";
        if (value < 0) return "return-negative";
    
        return "return-neutral";
    }
    
    function getOutperformanceClass(value) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return "return-neutral";
        }
    
        // For outperformance multiple:
        // > 1 means AI strategy performed better than buy & hold
        // < 1 means AI strategy underperformed buy & hold
        if (value > 1) return "return-positive";
        if (value < 1) return "return-negative";
    
        return "return-neutral";
    }
    
    function formatSignal(signal) {
        if (signal === 1) {
            return `<span class="signal-badge signal-buy">▲ BUY</span>`;
        }
    
        if (signal === -1) {
            return `<span class="signal-badge signal-sell">▼ SELL</span>`;
        }
    
        return `<span class="signal-badge signal-hold">— HOLD</span>`;
    }
    
    function formatPercent(value) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return `<span class="return-value return-neutral">—</span>`;
        }
    
        const percent = value * 100;
        const sign = percent > 0 ? "+" : "";
    
        return `
            <span class="return-value ${getReturnClass(value)}">
                ${sign}${percent.toFixed(1)}%
            </span>
        `;
    }
    
    function formatMultiple(value) {
        if (value === null || value === undefined || Number.isNaN(value)) {
            return `<span class="return-value return-neutral">—</span>`;
        }
    
        return `
            <span class="return-value ${getOutperformanceClass(value)}">
                ${value.toFixed(2)}×
            </span>
        `;
    }

    function durationLabel(value) {
        const labels = {
            "1w": "1W",
            "1mo": "1M",
            "3mo": "3M",
            "6mo": "6M",
            "1y": "1Y",
            "3y": "3Y",
            "5y": "5Y",
            "10y": "10Y",
            "1yr": "1Y",
            "3yr": "3Y",
            "5yr": "5Y"
        };
    
        return labels[value] || value.toUpperCase();
    }

    function updateAssumptionsBar(count) {
        const horizonEl = document.getElementById("assumption-horizon");
        const countEl = document.getElementById("assumption-asset-count");
    
        const duration = document.getElementById("period-select")?.value || "5y";
    
        if (horizonEl) {
            horizonEl.textContent = durationLabel(duration);
        }
    
        if (countEl) {
            const safeCount = Number.isFinite(count) ? count : allSignals.length;
            countEl.textContent = safeCount.toString();
        }
    }
    
    function normalizedDollarText(returnValue) {
        if (returnValue === null || returnValue === undefined || Number.isNaN(returnValue)) {
            return "Normalized $1 → —";
        }
    
        const finalValue = 1 + returnValue;
    
        return "Normalized $1 → $" + finalValue.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }
    
    function signalSubText(signal) {
        if (signal === 1) return "Bullish";
        if (signal === -1) return "Bearish";
        return "Neutral";
    }
    
    function updateSelectedPerformanceCards(ticker) {
        const panel = document.getElementById("selected-performance-panel");
        if (!panel) return;
    
        const selectedTicker = ticker || currentTicker || "BTC-USD";
    
        const item =
            defaultOrder.find(row => row.ticker === selectedTicker) ||
            allSignals.find(row => row.ticker === selectedTicker);
    
        if (!item) return;
    
        const duration = document.getElementById("period-select")?.value || "5y";
        const horizon = durationLabel(duration);
    
        document.getElementById("metric-selected-ticker").textContent = item.ticker;
        document.getElementById("metric-selected-horizon").textContent = horizon;
    
        document.querySelectorAll(".metric-horizon-text").forEach(el => {
            el.textContent = horizon;
        });
    
        document.getElementById("metric-strategy-return").innerHTML =
            formatPercent(item.strategy_annual_return);
    
        document.getElementById("metric-buyhold-return").innerHTML =
            formatPercent(item.buy_hold_annual_return);
    
        document.getElementById("metric-outperformance").innerHTML =
            formatMultiple(item.outperformance);
    
        document.getElementById("metric-today-signal").innerHTML =
            formatSignal(item.today_signal);
    
        document.getElementById("metric-strategy-sub").textContent =
            normalizedDollarText(item.strategy_annual_return);
    
        document.getElementById("metric-buyhold-sub").textContent =
            normalizedDollarText(item.buy_hold_annual_return);
    
        document.getElementById("metric-signal-sub").textContent =
            signalSubText(item.today_signal);
    }
    
    let currentSort = {
        key: null,
        direction: 1   // 1 = ascending, -1 = descending
    };
    
    function sortBy(key) {
    
        if (currentSort.key !== key) {
            currentSort.key = key;
            currentSort.direction = 1;
        }
        else {
            if (currentSort.direction === 1) {
                currentSort.direction = -1;
            }
            else {
                currentSort.key = null;
                currentSort.direction = 1;
                updateSortIndicators();
                applyAllFilters();
                return;
            }
        }
    
        updateSortIndicators();
        applyAllFilters();
    }
    
    function updateSortIndicators() {
    
        const buyHoldEl = document.getElementById("buy-hold-sort-indicator");
        const strategyEl = document.getElementById("strategy-sort-indicator");
        const outperformanceEl = document.getElementById("outperformance-sort-indicator");
    
        if (!buyHoldEl || !strategyEl || !outperformanceEl) return;
    
        // Default state
        buyHoldEl.innerHTML = "—";
        strategyEl.innerHTML = "—";
        outperformanceEl.innerHTML = "—";
    
        if (!currentSort.key) return;
    
        const arrow = currentSort.direction === 1 ? "▲" : "▼";
    
        if (currentSort.key === "buy_hold_annual_return") {
            buyHoldEl.innerHTML = arrow;
        }
    
        if (currentSort.key === "strategy_annual_return") {
            strategyEl.innerHTML = arrow;
        }
    
        if (currentSort.key === "outperformance") {
            outperformanceEl.innerHTML = arrow;
        }
    }
    
    function renderBoard(data) {
        board.innerHTML = data.map(item => `
            <div
                class="signal-row"
                data-ticker="${item.ticker}"
                onclick="loadTicker('${item.ticker}')"
                style="
                    display: grid;
                    grid-template-columns: 160px 100px 100px 100px 100px 140px 160px 120px;
                    align-items: center;
                    padding: 7px 10px;
                    border-bottom: 1px solid #eee;
                    cursor: pointer;
                    box-sizing: border-box;
                    width: 100%;
                "
            >
                <div class="signal-ticker">${item.ticker}</div>
    
                <div class="signal-cell-left">${formatSignal(item.today_signal)}</div>
                <div class="signal-cell-left">${formatSignal(item.yesterday_signal)}</div>
                <div class="signal-cell-left">${formatSignal(item.last_week_signal)}</div>
                <div class="signal-cell-left">${formatSignal(item.last_month_signal)}</div>
    
                <div class="signal-cell-right">${formatPercent(item.buy_hold_annual_return)}</div>
                <div class="signal-cell-right">${formatPercent(item.strategy_annual_return)}</div>
                <div class="signal-cell-right">${formatMultiple(item.outperformance)}</div>
            </div>
        `).join('');
    
        highlightSelectedTicker();
    }

    function highlightSelectedTicker() {
        if (!currentTicker) return;
    
        document.querySelectorAll("#signal-board .signal-row").forEach(row => {
            row.classList.toggle("selected", row.dataset.ticker === currentTicker);
        });
    }
    
    /* ===============================
       2. QUICK SIGNAL BOARD (AUTO LOAD)
    ================================ */
    
    const board = document.getElementById('signal-board');
    
    board.innerHTML = `
        <div style="text-align:center; color:#888; padding:20px;">
            Loading signals…
        </div>
    `;
    
    function loadSummary() {
        const duration = document.getElementById('period-select').value; // e.g., '1w', '1mo', '1y'
    
        fetch(`/signals/summary?duration=${duration}&_=${Date.now()}`)
            .then(r => r.json())
            .then(data => {
                allSignals = data;
                defaultOrder = [...data];
            
                updateSortIndicators();
                applyAllFilters();
            
                // Auto-load BTC-USD preview only once
                if (!currentTicker) {
                    const btcExists = data.find(item => item.ticker === "BTC-USD");
                    if (btcExists) {
                        loadTicker("BTC-USD");
                    }
                } else {
                    updateSelectedPerformanceCards(currentTicker);
                }
            })
            .catch(err => {
                board.innerHTML = `<div style="color:red;">Failed to load signals</div>`;
                console.error(err);
            });
    }
    
    // Load on page start
    loadSummary();
    
    document.querySelectorAll('.signal-filter').forEach(select => {
        select.addEventListener('change', function() {
            const key = this.dataset.key;
            const value = this.value;
    
            signalFilters[key] = value === "" ? null : parseInt(value);
    
            this.classList.toggle("nt-filter-active", value !== "");
    
            applyAllFilters();
        });
    });
    
    document.getElementById('period-select')
        .addEventListener('change', function() {
    
            board.innerHTML = `
                <div style="text-align:center; color:#888; padding:20px;">
                    Updating period…
                </div>
            `;
    
            loadSummary();
    
            // 🔥 If a ticker is already selected, update its chart too
            if (currentTicker) {
                loadTicker(currentTicker);
            }
            updateAssumptionsBar();
        });

    /* ===============================
       Return horizon pill buttons
    ================================ */
    
    function syncPeriodPills() {
        const select = document.getElementById("period-select");
        if (!select) return;
    
        document.querySelectorAll(".period-pill").forEach(btn => {
            const isActive = btn.dataset.value === select.value;
            btn.classList.toggle("active", isActive);
            btn.setAttribute("aria-pressed", isActive ? "true" : "false");
        });
    }
    
    document.querySelectorAll(".period-pill").forEach(btn => {
        btn.addEventListener("click", function () {
            const select = document.getElementById("period-select");
            if (!select) return;
    
            const newValue = this.dataset.value;
    
            if (select.value === newValue) {
                return;
            }
    
            select.value = newValue;
            syncPeriodPills();
    
            // Trigger your existing period-select change logic:
            // reload signal summary, update selected asset, update chart.
            select.dispatchEvent(new Event("change", { bubbles: true }));
        });
    });
    
    // Initial visual sync on page load
    syncPeriodPills();
    
    document.getElementById('ticker-search')
        .addEventListener('input', function() {
            applyAllFilters();
        });
    
    document.getElementById('asset-type-filter')
        .addEventListener('change', function() {
    
            assetTypeFilter = this.value;
            applyAllFilters();
        });

    /* ===============================
       Asset type pill buttons
    ================================ */
    
    function syncAssetPills() {
        const select = document.getElementById("asset-type-filter");
        if (!select) return;
    
        document.querySelectorAll(".asset-pill").forEach(btn => {
            const isActive = btn.dataset.value === select.value;
            btn.classList.toggle("active", isActive);
            btn.setAttribute("aria-pressed", isActive ? "true" : "false");
        });
    }
    
    document.querySelectorAll(".asset-pill").forEach(btn => {
        btn.addEventListener("click", function () {
            const select = document.getElementById("asset-type-filter");
            if (!select) return;
    
            const newValue = this.dataset.value;
    
            if (select.value === newValue) {
                return;
            }
    
            select.value = newValue;
            syncAssetPills();
    
            // Trigger your existing asset filter logic
            select.dispatchEvent(new Event("change", { bubbles: true }));
        });
    });
    
    // Initial visual sync
    syncAssetPills();
    
    document.getElementById("reset-signal-board")
        .addEventListener("click", function () {
            clearSignalBoardFilters();
        });

    document.addEventListener("click", function (e) {
        const btn = e.target.closest("#active-filter-clear");
    
        if (!btn) return;
    
        clearSignalBoardFilters();
    });
    
    /* ===============================
       3. LOAD TICKER FROM BOARD CLICK
    ================================ */
    
    let currentTicker = null;
    let previewChart = null;   // 🔥 prevents duplicate charts
    
    function loadTicker(ticker) {
    
        currentTicker = ticker;
        
        highlightSelectedTicker();
        updateSelectedPerformanceCards(ticker);
        syncBacktestTicker(ticker);
    
        const duration = document.getElementById('period-select').value;
    
        const formData = new FormData();
        formData.append('ticker', ticker);
        formData.append('duration', duration);
    
        // 2️⃣ Load equity preview (UNDER BOARD)
        fetch('/equity', {
            method: 'POST',
            body: formData
        })
        .then(r => r.json())
        .then(renderEquityPreview);
    }
    
    /* ===============================
       4. EXISTING FORM SUBMIT (STILL WORKS)
    ================================ */
    
    const signalForm = document.getElementById('signal-form');
    if (signalForm) {
        signalForm.addEventListener('submit', function(e) {
            e.preventDefault();
    
            const formData = new FormData(this);
    
            fetch('/signals', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(renderSignals);
        });
    }
    
    /* ===============================
       5. RENDER DETAILED SIGNALS
    ================================ */
    
    function renderSignals({
        ticker,
        today_signal,
        yesterday_signal,
        last_week_signal,
        last_month_signal,
        buy_hold_annual_return,
        strategy_annual_return,
        outperformance
    }) {
        const signalsDiv = document.getElementById('signals');
    
        signalsDiv.innerHTML = `
            <div>
                <h3>${ticker}</h3>
    
                <div style="
                    display: grid;
                    grid-template-columns: 160px 100px 100px 100px 100px 140px 160px 120px;
                    align-items: center;
                    box-sizing: border-box;
                    width: 100%;
                ">
                    <div><strong>${ticker}</strong></div>
                    <div style="text-align:left;">Today: ${formatSignal(today_signal)}</div>
                    <div style="text-align:left;">Yesterday: ${formatSignal(yesterday_signal)}</div>
                    <div style="text-align:left;">Last Week: ${formatSignal(last_week_signal)}</div>
                    <div style="text-align:left;">Last Month: ${formatSignal(last_month_signal)}</div>
                    <div style="text-align:right;">Buy&Hold Return: ${formatPercent(buy_hold_annual_return)}</div>
                    <div style="text-align:right;">EpochSignaler Return: ${formatPercent(strategy_annual_return)}</div>
                    <div style="text-align:right;">Outperformance${formatMultiple(outperformance)}</div>
                </div>
            </div>
        `;
    }
    
    const signalMarkerPlugin = {
        id: "signalMarkerPlugin",
        afterDatasetsDraw(chart) {
    
            const { ctx } = chart;
    
            chart.data.datasets.forEach((dataset, datasetIndex) => {
    
                if (!dataset.isSignal) return;
    
                const meta = chart.getDatasetMeta(datasetIndex);
    
                meta.data.forEach(point => {
    
                    if (!point || point.skip) return;
    
                    const x = point.x;
                    const y = point.y;
    
                    const offset = dataset.offsetPx || 0;
    
                    ctx.save();
    
                    ctx.translate(x, y + offset);
    
                    ctx.beginPath();
    
                    if (dataset.direction === "buy") {
                        // Up triangle
                        ctx.moveTo(0, -8);
                        ctx.lineTo(6, 6);
                        ctx.lineTo(-6, 6);
                    } else {
                        // Down triangle
                        ctx.moveTo(0, 8);
                        ctx.lineTo(6, -6);
                        ctx.lineTo(-6, -6);
                    }
    
                    ctx.closePath();
                    ctx.fillStyle = dataset.color;
                    ctx.fill();
    
                    ctx.restore();
                });
            });
        }
    };
    
    Chart.register(signalMarkerPlugin);

                        offsetPx: 11
                    },
                    {

        const toggleBtn = document.getElementById("scale-toggle-btn");
        
        toggleBtn.innerText = isLogScale
            ? "Normal Scale"
            : "Log Scale";
    }
    
    // Global delegated click handler
    document.addEventListener("click", function (e) {

        const btn = e.target.closest("#scale-toggle-btn");
    
        if (!btn) return;
        if (!previewChart) return;
    
        isLogScale = !isLogScale;
    
        btn.innerText = isLogScale
            ? "Normal Scale"
            : "Log Scale";
    
        const previewScaleModeEl = document.getElementById("preview-scale-mode");
        if (previewScaleModeEl) {
            previewScaleModeEl.textContent = isLogScale ? "Log" : "Linear";
        }
    
        previewChart.options.scales.y.type =
            isLogScale ? "logarithmic" : "linear";
    
        previewChart.update();
    });

    document.addEventListener("click", function (e) {

        const btn = e.target.closest("#backtest-scale-toggle-btn");
    
        if (!btn) return;
    
        const chart =
            window.equityChart ||
            (typeof equityChart !== "undefined" ? equityChart : null);
    
        if (!chart) return;
    
        window.backtestLogScale = !window.backtestLogScale;
    
        btn.innerText = window.backtestLogScale
            ? "Normal Scale"
            : "Log Scale";
    
        const scaleModeEl = document.getElementById("backtest-scale-mode");
        if (scaleModeEl) {
            scaleModeEl.textContent = window.backtestLogScale ? "Log" : "Linear";
        }
    
        chart.options.scales.y.type =
            window.backtestLogScale ? "logarithmic" : "linear";
    
        chart.update();
    });
    
    // Load default ticker
    setTimeout(() => {
        loadTicker("BTC-USD");
    }, 200);
        
    </script>
    
    <script>
    function showModal(message, iconHTML) {
        const modal = document.getElementById("customModal");
        const modalMessage = document.getElementById("modal-message");
        const modalIcon = document.getElementById("modal-icon");
    
        modalMessage.textContent = message;
        modalIcon.innerHTML = iconHTML || "";
    
        modal.classList.add("show");
    
        // Auto-close after 3 seconds with fade-out
        setTimeout(() => {
            modal.classList.remove("show");
            setTimeout(() => {
                modal.style.display = "none";
            }, 400); // match transition time
        }, 3000);
    
        modal.style.display = "block";
    }
    
    // Manual close
    const closeBtn = document.querySelector(".close-btn");
    if (closeBtn) {
        closeBtn.addEventListener("click", function () {
            const modal = document.getElementById("customModal");
            modal.classList.remove("show");
            setTimeout(() => modal.style.display = "none", 400);
        });
    }
    
    // Click outside to close
    window.addEventListener("click", function (event) {
        const modal = document.getElementById("customModal");
        if (event.target === modal) {
            modal.classList.remove("show");
            setTimeout(() => modal.style.display = "none", 400);
        }
    });
    
    // Form Validation
    
    const backtestForm = document.getElementById("backtest-form");
    if (backtestForm) {
        backtestForm.addEventListener("submit", function(event) {
            const startDate = new Date(document.getElementById("start").value);
            // const endDate = new Date(document.getElementById("end").value);
            const today = new Date();
            startDate.setHours(0,0,0,0);
            today.setHours(0,0,0,0);
        
            // if (startDate > endDate) {
            //     showModal("❌ Start Date cannot be after End Date.", "Error!");
            //     event.preventDefault();
            //     return;
            // }
        
            if (startDate >= today) {
                showModal("❌ Start Date cannot be in the future.", "Error!");
                event.preventDefault();
                return;
            }
        
            // If passes validation
            showModal("✅ Backtest started successfully!", "Success!");
        });
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        const startInput = document.getElementById("start");
    
        // 🔧 Set how many days before today should be the latest selectable
        const x = 0; // example: today - 2 days
    
        // Calculate (today - x days)
        const maxDateObj = new Date();
        maxDateObj.setDate(maxDateObj.getDate() - x);
    
        // Format to yyyy-mm-dd for input[type=date]
        const yyyy = maxDateObj.getFullYear();
        const mm = String(maxDateObj.getMonth() + 1).padStart(2, "0");
        const dd = String(maxDateObj.getDate()).padStart(2, "0");
    
        const maxDate = `${yyyy}-${mm}-${dd}`;
    
        // Apply restriction
        startInput.setAttribute("max", maxDate);
        // setLoggedOut();
    });
        
    </script>

    <script>
    // const loginBtn = document.getElementById("login-btn");
    const loginModal = document.getElementById("loginModal"); // FIXED
    const closeModal = document.querySelector(".close-btn");
    
    const signupBtn = document.getElementById("signupBtn");
    const signinBtn = document.getElementById("signinBtn");
    
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    
    const authMessage = document.getElementById("authMessage");
    const userArea = document.getElementById("user-area");
    
    // ------------------
    // Close modal
    // ------------------
    closeModal.addEventListener("click", function() {
        loginModal.style.opacity = "0";
        setTimeout(() => {
            loginModal.style.display = "none";
        }, 300);
    });
    
    window.addEventListener("click", function(e) {
        if (e.target === loginModal) {
            loginModal.style.opacity = "0";
            setTimeout(() => {
                loginModal.style.display = "none";
            }, 300);
        }
    });

    signupBtn.addEventListener("click", async function() {
        const response = await fetch("/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: emailInput.value.trim(),
                password: passwordInput.value
            })
        });
    
        const data = await response.json();
    
        if (data.message) {
            authMessage.innerText = "Check your email to verify your account.";
    
            // Close modal after short delay (better UX)
            setTimeout(() => {
                loginModal.style.opacity = "0";
                setTimeout(() => {
                    loginModal.style.display = "none";
                }, 300);
            }, 1500);
    
        } else {
            authMessage.innerText = data.error;
        }
    });
    
    // ------------------
    // Login
    // ------------------
    signinBtn.addEventListener("click", async function() {
        const email = emailInput.value;
        const password = passwordInput.value;
    
        const response = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: emailInput.value.trim(),
                password: passwordInput.value
            })
        });
    
        const data = await response.json();
    
        if (data.message) {
            authMessage.innerText = data.message;
            loginModal.style.opacity = "0";
            setTimeout(() => {
                loginModal.style.display = "none";
            }, 300);
            await checkUser();
        } else {
            authMessage.innerText = data.error;
        }
    });
    
    // ------------------
    // Logout
    // ------------------
    async function logout() {
        await fetch("/logout", {
            method: "POST"
        });
    
        userArea.innerHTML = `<a href="#" id="login-btn">Login</a>`;
        location.reload();
    }

    // ------------------
    // Password Reset
    // ------------------
    document.addEventListener("click", async function(e) {
        if (e.target && e.target.id === "forgot-password") {
            e.preventDefault();
    
            const email = prompt("Enter your email:");
            if (!email) return;
    
            const res = await fetch("/request-password-reset", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ email })
            });
    
            const data = await res.json();
            alert(data.message);
        }
    });

    // ------------------
    // Delete Account
    // ------------------
    async function deleteAccount() {
        const confirmDelete = confirm("Are you sure you want to permanently delete your account?");
    
        if (!confirmDelete) return;
    
        const response = await fetch("/request-delete-account", {
            method: "POST"
        });
    
        const data = await response.json();
    
        alert(data.message);
    }
    
    // ------------------
    // Check current user
    // ------------------
    async function checkUser() {
        const response = await fetch("/me");
        const data = await response.json();
    
        if (data.email) {
            userArea.innerHTML = `
                <div class="user-menu" id="userMenu">
                    <div class="user-pill">
                        ${data.email}
                        <span class="arrow">▼</span>
                    </div>
            
                    <div class="dropdown" id="dropdownMenu" style="display:none;">
                        <div onclick="logout()">Logout</div>
                        <div onclick="deleteAccount()" style="color:red;">Delete Account</div>
                    </div>
                </div>
            `;
        } else {
            // 🔑 reset to login button if not authenticated
            userArea.innerHTML = `<a href="#" id="login-btn">Login</a>`;
        }
    }
    
    document.addEventListener("click", function(e) {
    
        // ✅ Handle Login button (works even after re-render)
        if (e.target && e.target.id === "login-btn") {
            e.preventDefault();
            loginModal.style.display = "flex";
            loginModal.style.opacity = "1";
            return;
        }
    
        // ✅ Dropdown logic
        const menu = document.getElementById("userMenu");
        const dropdown = document.getElementById("dropdownMenu");
    
        if (!menu || !dropdown) return;
    
        const pill = menu.querySelector(".user-pill");
    
        if (pill && pill.contains(e.target)) {
            dropdown.style.display =
                dropdown.style.display === "block" ? "none" : "block";
        } else {
            dropdown.style.display = "none";
        }
    });
    
    // Run on page load
    checkUser();
    </script>
