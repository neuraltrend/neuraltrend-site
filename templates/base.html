<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9633315289535323"
     crossorigin="anonymous"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>NeuralTrend</title>
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Plotly CDN (include once per page, ideally in <head>) -->
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    
    <style>
        :root {
            --nav-height: 110px; /* adjust if needed */
        
            --nt-positive: #16A34A;       /* green */
            --nt-negative: #DC2626;       /* red */
            --nt-neutral: #64748B;        /* slate gray */
            --nt-dark: #0F172A;
            --nt-blue: #2563EB;
            --nt-purple: #9333EA;
            --nt-selected-row: #EAF6FF;
            --nt-row-hover: #F8FAFC;
            --nt-border: #E2E8F0;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            font-size: 18px;
        }

        /* Navbar container */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a7d9c;
            padding: 10px 30px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            z-index: 1000;
        }

        /* Logo styling */
        .navbar .logo img {
            height: 100px;
        }

        /* Links container */
        .navbar .nav-links {
            display: flex;
        }

        /* Links styling */
        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            margin-left: 5px;
            font-size: 16px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        /* Hover effect */
        .navbar .nav-links a:hover {
            background-color: #575757;
        }
        

        .user-menu {
            position: relative;
            cursor: pointer;
        }

        /* User pill */
        .user-pill {
            background: white;
            color: #1a7d9c;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        
        .user-pill:hover {
            background: #f0f0f0;
        }
        
        /* Arrow */
        .user-pill .arrow {
            font-size: 10px;
        }
        
        /* Dropdown */
        .dropdown {
            position: absolute;
            right: 0;
            top: 120%;
            background: white;
            border-radius: 8px;
            min-width: 120px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        
        /* Dropdown item */
        .dropdown div {
            padding: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .dropdown div:hover {
            background: #f2f2f2;
        }

        /* Main content pushed down below navbar */
        main {
            padding-top: calc(var(--nav-height) + 20px);
            padding-left: 30px; /* added left padding */
        }
        
        /* Make the form layout two rows: title row and inputs row */
        #backtest-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* First row (title) */
        .trade-form h3 {
            margin: 0;
            text-align: center;
        }
        
        /* Second row (all inputs in one line) */
        .form-row {
            display: flex;
            flex-wrap: wrap; /* Wrap on smaller screens */
            gap: 10px;
            justify-content: center;
        }
        
        /* Make labels and inputs stay together */
        .form-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        
        /* Reduce input width so they fit in one line */
        .form-group input,
        .form-group select {
            width: 145px;
        }
        
        #backtest-form label {
            margin: 0 5px 0 0; /* small space after label */
        }

        #backtest-form input,
        #backtest-form select,
        #backtest-form button {
            margin: 0 10px 0 0;
        }
        
        #backtest-form button {
            white-space: nowrap; /* prevents breaking button text */
        }
        
        /* Make form labels bigger */
        label {
            font-size: 15px;
        }
        
        /* Make inputs bigger (both text & number/date selectors) */
        input, select, textarea, button {
            font-size: 15px;   /* text inside box */
            padding: 8px 10px; /* a bit more padding for comfort */
        }
        
        /* Make placeholder text bigger */
        input::placeholder, textarea::placeholder {
            font-size: 15px;
        }

        /* Optional: make the "Run Backtest" button match */
        button {
            font-size: 15px;
            padding: 10px 15px;
            cursor: pointer;
        }

        /* Results section */
        .results-section {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            margin: 20px auto;
            width: 90%;
            max-width: 1200px;
            border: 1px solid #e0e0e0;
        }
        #results p {
            color: #000000;
            font-size: 20px;
            line-height: 1.6;
        }

        /* Smooth fade transition */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
    
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border: 1px solid #888;
            width: 300px;
            border-radius: 8px;
            text-align: center;
        }

        .close-btn {
            float: right;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Auth area container */
        .auth-area {
            display: flex;
            align-items: center;
        }
        
        /* Login button */
        #login-btn {
            background: white;
            color: #1a7d9c;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 2px solid white;
        }
        
        /* Hover effect */
        #login-btn:hover {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        #signupBtn, #signinBtn {
            margin-top: 15px;
        }

        #forgot-password {
            font-size: 12px;
            color: #777;
            text-align: center;
        }

        #forgot-password:hover {
            text-decoration: underline;
            color: #000;
        }

        /* Footer styling */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            background-color: #f2f2f2;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        
        .footer a {
            color: black;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }

        /* ===============================
           Optional centered main title only
        ================================ */
        
        .nt-page-header-center {
            text-align: center;
        }
        
        .nt-page-header-center .nt-page-title {
            text-align: center;
        }

        /* ===============================
           Models section layout
        ================================ */
        
        .nt-models-section {
            max-width: 1180px;
            margin: 0 auto;
            padding: 36px 24px 60px 24px;
        }
        
        .nt-models-header {
            margin-bottom: 18px;
        }
        
        .nt-models-kicker {
            font-size: 12px;
            font-weight: 850;
            color: var(--nt-blue);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        
        .nt-models-title {
            margin: 0;
            font-size: 30px;
            font-weight: 900;
            color: var(--nt-dark);
        }
        
        .nt-models-subtitle {
            max-width: 760px;
            margin: 8px 0 0 0;
            font-size: 15px;
            line-height: 1.6;
            color: var(--nt-neutral);
            font-weight: 600;
        }
        
        .nt-model-tabs {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 18px 0 22px 0;
        }
        
        .nt-model-tab {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 14px;
            border-radius: 999px;
            border: 1px solid var(--nt-border);
            background: #ffffff;
            color: var(--nt-dark);
            text-decoration: none;
            font-size: 13px;
            font-weight: 850;
            transition: all 0.15s ease;
        }
        
        .nt-model-tab:hover {
            background: #F1F5F9;
            border-color: #CBD5E1;
        }
        
        .nt-model-tab.active {
            background: var(--nt-dark);
            border-color: var(--nt-dark);
            color: #ffffff;
        }
        
        .nt-models-container {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }
        
        .nt-model-panel {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
            padding: 22px;
            scroll-margin-top: calc(var(--nav-height) + 20px);
        }
        
        .nt-model-panel-header {
            margin-bottom: 18px;
        }
        
        .nt-model-panel-title {
            margin: 0;
            font-size: 22px;
            font-weight: 900;
            color: var(--nt-dark);
        }
        
        .nt-model-panel-description {
            margin: 8px 0 0 0;
            font-size: 14px;
            line-height: 1.6;
            color: var(--nt-neutral);
            font-weight: 600;
        }
        
        @media (max-width: 700px) {
            .nt-models-section {
                padding: 28px 14px 50px 14px;
            }
        
            .nt-models-title {
                font-size: 24px;
            }
        
            .nt-model-panel {
                padding: 16px;
            }
        }

        /* ===============================
           Consistent section title alignment
        ================================ */
        
        .nt-page-header {
            width: 100%;
            margin: 0 0 18px 0;
            text-align: left;
        }
        
        .nt-page-title {
            margin: 0;
            font-size: 22px;
            font-weight: 850;
            color: var(--nt-dark);
            text-align: left;
        }
        
        /* Override older centered form-title rules */
        .nt-backtest-section .nt-backtest-header {
            justify-content: flex-start;
            text-align: left;
            width: 100%;
        }
        
        .nt-backtest-section .nt-backtest-title {
            text-align: left !important;
        }
        
        .nt-backtest-section .trade-form h3 {
            text-align: left !important;
        }
        
        .nt-backtest-section #backtest-form {
            align-items: stretch !important;
        }
        
        .nt-backtest-section .form-row {
            justify-content: stretch !important;
        }

        /* ===============================
           Current view / active filters row
        ================================ */

        .nt-active-filter-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            flex-wrap: wrap;
            margin: 10px 0 12px 0;
            padding: 9px 12px;
            background: #F8FAFC;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
        }
        
        .nt-active-filter-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nt-active-filter-label {
            font-size: 12px;
            font-weight: 850;
            color: var(--nt-dark);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
    
        .nt-active-filter-chips {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
        }
        
        .nt-active-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 9px;
            border-radius: 999px;
            background: #F8FAFC;
            border: 1px solid var(--nt-border);
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 750;
        }

        .nt-active-chip.chip-assumption {
            color: var(--nt-dark);
            background: rgba(37, 99, 235, 0.06);
            border-color: rgba(37, 99, 235, 0.16);
        }
        
        .nt-active-chip.chip-buy {
            color: var(--nt-positive);
            background: rgba(22, 163, 74, 0.08);
            border-color: rgba(22, 163, 74, 0.20);
        }
        
        .nt-active-chip.chip-sell {
            color: var(--nt-negative);
            background: rgba(220, 38, 38, 0.08);
            border-color: rgba(220, 38, 38, 0.20);
        }
        
        .nt-active-chip.chip-hold {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.08);
            border-color: rgba(100, 116, 139, 0.20);
        }
        
        .nt-active-clear-btn {
            border: none;
            background: transparent;
            color: var(--nt-blue);
            font-size: 12px;
            font-weight: 850;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 999px;
            transition: all 0.15s ease;
        }
        
        .nt-active-clear-btn:hover {
            background: rgba(37, 99, 235, 0.08);
        }
        
        @media (max-width: 700px) {
            .nt-active-filter-row {
                align-items: flex-start;
            }
        
            .nt-active-clear-btn {
                width: 100%;
                text-align: left;
            }
        }

        /* ===============================
           Backtest results cards
        ================================ */
        
        .nt-backtest-results {
            margin-top: 18px;
        }
        
        .nt-backtest-results-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }
        
        .nt-backtest-results-title {
            margin: 0;
            font-size: 18px;
            font-weight: 850;
            color: var(--nt-dark);
        }
        
        .nt-backtest-results-subtitle {
            margin: 4px 0 0 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-result-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }
        
        .nt-result-pill strong {
            color: var(--nt-dark);
        }
        
        .nt-backtest-results-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 16px;
        }
        
        .nt-result-card {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            padding: 15px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
        }
        
        .nt-result-label {
            font-size: 12px;
            font-weight: 800;
            color: var(--nt-neutral);
            margin-bottom: 7px;
        }
        
        .nt-result-value {
            font-size: 24px;
            font-weight: 850;
            color: var(--nt-dark);
            line-height: 1.1;
        }
        
        .nt-result-sub {
            margin-top: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-backtest-chart-card {
            margin-top: 14px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            padding: 14px;
        }
        
        .nt-backtest-chart-title {
            font-size: 14px;
            font-weight: 850;
            color: var(--nt-dark);
            margin-bottom: 10px;
        }
        
        .nt-backtest-chart-shell {
            height: 430px;
            width: 100%;
            position: relative;
        }
        
        @media (max-width: 900px) {
            .nt-backtest-results-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        
        @media (max-width: 600px) {
            .nt-backtest-results-header {
                flex-direction: column;
            }
        
            .nt-backtest-results-grid {
                grid-template-columns: 1fr;
            }
        
            .nt-backtest-chart-shell {
                height: 320px;
            }
        }

        /* ===============================
           Return horizon segmented buttons
        ================================ */
        
        .nt-period-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nt-period-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--nt-dark);
            white-space: nowrap;
        }
        
        .nt-period-pills {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: #F1F5F9;
            border: 1px solid var(--nt-border);
            border-radius: 999px;
        }
        
        .period-pill {
            border: none;
            background: transparent;
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 800;
            padding: 7px 11px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .period-pill:hover {
            background: #E2E8F0;
            color: var(--nt-dark);
        }
        
        .period-pill.active {
            background: var(--nt-blue);
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.25);
        }

        /* ===============================
           NeuralTrend color system
           Step 1: table + signal colors
        ================================ */
        
        /* Signal badges */
        .signal-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 68px;
            padding: 3px 9px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        
        .signal-buy {
            color: var(--nt-positive);
            background: rgba(22, 163, 74, 0.10);
            border: 1px solid rgba(22, 163, 74, 0.22);
        }
        
        .signal-sell {
            color: var(--nt-negative);
            background: rgba(220, 38, 38, 0.10);
            border: 1px solid rgba(220, 38, 38, 0.22);
        }
        
        .signal-hold {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.10);
            border: 1px solid rgba(100, 116, 139, 0.18);
        }
        
        /* Return values */
        .return-value {
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        
        .return-positive {
            color: var(--nt-positive);
        }
        
        .return-negative {
            color: var(--nt-negative);
        }
        
        .return-neutral {
            color: var(--nt-neutral);
        }
        
        /* Signal board rows */
        .signal-row {
            transition: background 0.15s ease;
        }
        
        .signal-row:hover {
            background: var(--nt-row-hover);
        }
        
        .signal-row.selected {
            background: var(--nt-selected-row);
        }
        
        .signal-ticker {
            font-weight: 700;
            color: var(--nt-dark);
        }
        
        .signal-cell-right {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        
        .signal-cell-left {
            text-align: left;
        }

        /* ===============================
           Asset type segmented buttons
        ================================ */
        
        .nt-asset-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nt-asset-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--nt-dark);
            white-space: nowrap;
        }
        
        .nt-asset-pills {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: #F1F5F9;
            border: 1px solid var(--nt-border);
            border-radius: 999px;
        }
        
        .asset-pill {
            border: none;
            background: transparent;
            color: var(--nt-neutral);
            font-size: 12px;
            font-weight: 800;
            padding: 7px 12px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .asset-pill:hover {
            background: #E2E8F0;
            color: var(--nt-dark);
        }
        
        .asset-pill.active {
            background: var(--nt-dark);
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.22);
        }

        /* ===============================
           Signal table header filters
        ================================ */
        
        .nt-signal-table-card {
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
            background: #ffffff;
        }
        
        .nt-signal-header {
            display: grid;
            grid-template-columns: 160px 100px 100px 100px 100px 140px 160px 120px;
            align-items: center;
            gap: 0;
            padding: 11px 12px;
            border-bottom: 1px solid var(--nt-border);
            background: #F8FAFC;
            font-size: 13px;
            font-weight: 800;
            color: var(--nt-dark);
            white-space: nowrap;
            box-sizing: border-box;
            width: 100%;
        }
        
        .nt-header-title {
            display: block;
            margin-bottom: 5px;
        }
        
        .nt-header-right {
            text-align: right;
            cursor: pointer;
            user-select: none;
        }
        
        .nt-header-right:hover {
            color: var(--nt-blue);
        }
        
        .nt-sort-indicator {
            display: inline-block;
            margin-top: 5px;
            min-width: 18px;
            font-size: 11px;
            font-weight: 700;
            color: var(--nt-neutral);
        }
        
        .nt-signal-filter-select {
            width: 86px;
            padding: 4px 7px;
            border-radius: 999px;
            border: 1px solid var(--nt-border);
            background: #ffffff;
            color: var(--nt-neutral);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
        }
        
        .nt-signal-filter-select:hover {
            border-color: var(--nt-blue);
            color: var(--nt-dark);
        }
        
        .nt-signal-filter-select:focus {
            border-color: var(--nt-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        
        .nt-filter-active {
            border-color: var(--nt-blue) !important;
            color: var(--nt-blue) !important;
            background: rgba(37, 99, 235, 0.07) !important;
        }

            }

        /* ===============================
           Equity preview chart card
        ================================ */
        
        .nt-preview-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 18px;
        }
        
        .nt-preview-card {
            width: 1100px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.07);
            padding: 18px;

            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 12px;
        }
        
        .nt-preview-title {
            margin: 0;
            font-size: 20px;
            font-weight: 850;
            color: var(--nt-dark);
        }
        
        .nt-preview-subtitle {
            margin: 5px 0 0 0;
            font-size: 13px;
            font-weight: 600;

            font-weight: 800;

            }

           Selected asset performance cards
        ================================ */

        .nt-selected-meta {

            font-weight: 600;
            color: var(--nt-dark);
            margin-bottom: 12px;

            color: var(--nt-blue);
            font-weight: 800;
        }
        
        .nt-metric-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }
        
        .nt-metric-card {
            display: flex;
            align-items: center;
            gap: 14px;
            min-height: 92px;
            padding: 18px 20px;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
        }
        
        .nt-card-icon {
            width: 48px;
            height: 48px;
            flex: 0 0 48px;
            border-radius: 14px;

            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
        }
        
        .nt-icon-blue {
            color: var(--nt-blue);
            background: rgba(37, 99, 235, 0.10);
        }
        
        .nt-icon-purple {
            color: var(--nt-purple);
            background: rgba(147, 51, 234, 0.10);
        }
        
        .nt-icon-green {
            color: var(--nt-positive);
            background: rgba(22, 163, 74, 0.10);
        }
        
        .nt-icon-neutral {

            background: rgba(100, 116, 139, 0.12);
        }
        
        .nt-metric-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--nt-dark);

        .nt-metric-value {

        .nt-metric-sub {

        .nt-signal-value .signal-badge {

            padding: 6px 12px;
            font-size: 15px;
        }
        
        /* Responsive behavior */
        @media (max-width: 1000px) {
            .nt-metric-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        
        @media (max-width: 600px) {
            .nt-metric-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===============================
           Backtest simulation card
        ================================ */
        
        .nt-backtest-section {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.07);
            padding: 20px;
        }
        
        .nt-backtest-section #backtest-form {
            align-items: stretch;
            width: 100%;
        }
        
        .nt-backtest-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }
        
        .nt-backtest-title {
            margin: 0;
            font-size: 20px;
            font-weight: 850;
            color: var(--nt-dark);
        }
        
        .nt-backtest-subtitle {
            margin: 5px 0 0 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-backtest-section .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
            gap: 14px;
            align-items: end;
            justify-content: stretch;
        }
        
        .nt-backtest-section .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
            align-items: stretch;
        }
        
        .nt-backtest-section label {
            font-size: 12px;
            font-weight: 800;
            color: var(--nt-dark);
        }
        
        .nt-backtest-section input,
        .nt-backtest-section select {
            width: 100%;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--nt-border);
            background: #F8FAFC;
            color: var(--nt-dark);
            font-size: 14px;
            font-weight: 600;
            padding: 8px 10px;
            outline: none;
            transition: all 0.15s ease;
        }
        
        .nt-backtest-section input:hover,
        .nt-backtest-section select:hover {
            background: #ffffff;
            border-color: #CBD5E1;
        }
        
        .nt-backtest-section input:focus,
        .nt-backtest-section select:focus {
            background: #ffffff;
            border-color: var(--nt-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        
        .nt-run-backtest-btn {
            width: 100%;
            height: 42px;
            border: none;
            border-radius: 12px;
            background: var(--nt-blue);
            color: #ffffff;
            font-size: 14px;
            font-weight: 850;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .nt-run-backtest-btn:hover {
            background: #1D4ED8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        
        .nt-backtest-note {
            margin-top: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--nt-neutral);

            margin-top: 18px;
            padding: 16px;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            background: #F8FAFC;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 10px;
        }
        
        .nt-backtest-chart-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        @media (max-width: 650px) {
            .nt-backtest-chart-header {
                flex-direction: column;
                align-items: flex-start;
            }
        
            .nt-backtest-chart-actions {
                width: 100%;
            }
        
            .nt-backtest-chart-actions .nt-scale-btn {
                width: 100%;
            }

        /* ===============================
           Model tabs: show one model at a time
        ================================ */
        
        .nt-model-tabs {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0 22px 0;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        
        .nt-model-tab {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 9px 14px;
            border-radius: 999px;
            border: 1px solid var(--nt-border);
            background: #ffffff;
            color: var(--nt-dark);
            text-decoration: none;
            font-size: 13px;
            font-weight: 850;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
            flex: 0 0 auto;
        }
        
        .nt-model-tab:hover {
            background: #F1F5F9;
            border-color: #CBD5E1;
        }
        
        .nt-model-tab.active {
            background: var(--nt-dark);
            border-color: var(--nt-dark);
            color: #ffffff;
        }

        .nt-model-panel {
            display: none;
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
            padding: 22px;
            overflow: hidden;
        }
        
        .nt-model-panel.nt-model-panel-active {
            display: block;
        }

        ================================ */

        .nt-controls-card,
        .nt-metric-card,
        .nt-preview-card,
        .nt-backtest-section,
        .nt-signal-table-card {
            min-width: 0;
            box-sizing: border-box;

        .nt-model-panel p,
        .nt-model-panel-description,
        .nt-controls-subtitle,
        .nt-preview-subtitle,
        .nt-backtest-subtitle,
        .nt-backtest-note {
            overflow-wrap: break-word;
            word-break: normal;
        }
        
        .nt-model-panel .results-section {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;

            max-width: 100% !important;

        #equity-preview-chart,

            max-width: 100% !important;

            width: 100%;
        }
        
        .nt-controls-grid {
            width: 100%;
        }
        
        .nt-signal-table-card {
            width: 100%;
        }

            .nt-metric-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

        @media (max-width: 700px) {
            .nt-metric-grid {
                grid-template-columns: 1fr;
            }

            color: var(--nt-dark);
        }
        
        .nt-site-subtitle {
            max-width: 980px;
            margin: 0;
            font-size: 15px;
            line-height: 1.6;
            color: var(--nt-dark);

            max-width: none !important;
            margin: 0 !important;
            padding: 16px 0 60px 0 !important;
        }
        
        /* Make model cards use available width cleanly */
        .nt-models-container {
            width: 100%;
        }
        
        .nt-model-panel {
            width: 100%;
        }
        
        /* Large dashboard pieces should fill the card */
        .results-section {

            max-width: 100% !important;

        @media (max-width: 700px) {

        /* ===============================
           Vertical model selector
        ================================ */
        
        .nt-model-layout {
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr);
            gap: 22px;
            align-items: start;
        }
        
        .nt-model-sidebar {
            position: sticky;
            top: calc(var(--nav-height) + 24px);
            align-self: start;
        }
        
        .nt-model-sidebar-card {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
            padding: 14px;
        }
        
        .nt-model-sidebar-title {
            margin: 0 0 12px 0;
            font-size: 12px;
            line-height: 1.2;
            font-weight: 850;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--nt-blue);
        }
        
        .nt-model-tabs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 0;
            overflow: visible;
            padding: 0;
        }
        
        .nt-model-tab {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            text-align: left;
            gap: 4px;
            padding: 14px 14px;
            border-radius: 14px;
            border: 1px solid var(--nt-border);
            background: #ffffff;
            color: var(--nt-dark);
            font-size: 14px;
            font-weight: 850;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: normal;
            flex: initial;
        }
        
        .nt-model-tab:hover {
            background: #F8FAFC;
            border-color: #CBD5E1;
            transform: translateY(-1px);
        }
        
        .nt-model-tab.active {
            background: var(--nt-dark);
            border-color: var(--nt-dark);
            color: #ffffff;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.14);
        }
        
        .nt-model-tab-name {
            font-size: 14px;
            line-height: 1.25;
            font-weight: 900;
        }
        
        .nt-model-tab-desc {
            font-size: 12px;
            line-height: 1.35;
            font-weight: 600;
            opacity: 0.78;
        }
        
        .nt-model-content {
            min-width: 0;
        }
        
        .nt-model-panel {
            display: none;
        }
        
        .nt-model-panel.nt-model-panel-active {
            display: block;
        }
        
        /* Optional: slightly stronger model panel look */
        .nt-model-panel {
            background: #ffffff;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
            padding: 22px;
            overflow: hidden;
        }
        
        /* Responsive fallback */
        @media (max-width: 980px) {
            .nt-model-layout {
                grid-template-columns: 1fr;
            }
        
            .nt-model-sidebar {
                position: static;
            }
        
            .nt-model-sidebar-card {
                padding: 12px;
            }
        
            .nt-model-tabs {
                flex-direction: row;
                flex-wrap: wrap;
            }
        
            .nt-model-tab {
                width: auto;
                min-width: 180px;
                flex: 1 1 220px;
            }
        }
        
        @media (max-width: 640px) {
            .nt-model-tab {
                min-width: 100%;
            }
        }

        /* ===============================
           Model summary cards
        ================================ */
        
        .nt-model-summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin: 16px 0 20px 0;
        }
        
        .nt-model-summary-icon {
            width: 34px;
            height: 34px;
            flex: 0 0 34px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(37, 99, 235, 0.10);
            color: var(--nt-blue);
            font-size: 16px;
            font-weight: 900;
        }
        
        .nt-model-summary-label {
            font-size: 11px;
            line-height: 1.25;
            font-weight: 850;
            color: var(--nt-neutral);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }
        
        .nt-model-summary-value {
            font-size: 13px;
            line-height: 1.35;
            font-weight: 850;
            color: var(--nt-dark);
        }
        
        @media (max-width: 1050px) {
            .nt-model-summary-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        
        @media (max-width: 600px) {
            .nt-model-summary-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===============================
           EpochSignaler dashboard width cleanup
        ================================ */
        
        :root {
            --nt-signal-columns:
                minmax(130px, 1.15fr)
                repeat(4, minmax(95px, 0.85fr))
                minmax(135px, 1fr)
                minmax(150px, 1.05fr)
                minmax(145px, 1fr);
        }
        
        /* The EpochSignaler content should use the full model panel width */
        #epochsignaler-section {
            overflow: visible;
        }
        
        /* Remove old card-in-card squeeze from the main signal dashboard section */
        #epochsignaler-section .results-section.nt-epoch-dashboard {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
            box-shadow: none !important;
            background: transparent !important;
        }
        
        /* Full-width shell for signal overview */
        .nt-signal-board-shell {
            width: 100%;
            max-width: 100%;
            margin: 0;
        }
        
        /* Inner signal board card */
        .nt-signal-board-inner {
            width: 100%;
            max-width: 100%;
        }
        
        /* Keep table aligned and scroll only if screen is too narrow */
        .nt-signal-table-card {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
        }
        
        /* Header and rows must use the same column system */
        .nt-signal-header {
            grid-template-columns: var(--nt-signal-columns) !important;
            min-width: 980px;
        }
        
        #signal-board .signal-row {
            grid-template-columns: var(--nt-signal-columns) !important;
            min-width: 980px;
        }
        
        /* Body area keeps vertical scrolling */
        #signal-board {
            max-height: 280px;
            overflow-y: auto;
            overflow-x: visible;
        }
        
        /* Make dashboard cards use full width */
        #selected-performance-panel,
        .nt-controls-card,
        .nt-active-filter-row,
        .nt-preview-wrapper,
        .nt-backtest-section {
            width: 100%;
            max-width: 100%;
        }
        
        /* Remove unnecessary centering from old wrappers if still present */
        #epochsignaler-section [style*="justify-content: center"] {
            justify-content: stretch !important;
        }
        
        /* Equity preview should fill available width */
        #equity-preview-container,
        .nt-preview-card {
            width: 100% !important;
            max-width: 100% !important;
        }
        
        /* Backtest card should align with rest of dashboard */
        #epochsignaler-section .nt-backtest-section {
            margin-top: 18px;
        }
        
        /* On very wide screens, keep model layout balanced */
        @media (min-width: 1400px) {
            .nt-page-container {
                width: min(1440px, calc(100vw - 72px));
            }
        }
        
        /* On medium screens, let the model dashboard breathe */
        @media (max-width: 1200px) {
            .nt-model-layout {
                grid-template-columns: 220px minmax(0, 1fr);
                gap: 18px;
            }
        }
        
        @media (max-width: 980px) {
            .nt-model-layout {
                grid-template-columns: 1fr;
            }
        
            .nt-signal-header,
            #signal-board .signal-row {
                min-width: 920px;
            }
        }

        /* ===============================
           Live simulation active UI
        ================================ */

            cursor: pointer;
            opacity: 1;
        }
        
        .nt-live-sim-btn-active:hover {
            background: #020617;
            transform: translateY(-1px);
        }
        
        .nt-live-sim-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 14px;
            max-height: 360px;
            overflow-y: auto;
        }
        
        .nt-live-sim-item {

            border-radius: 14px;
            background: #ffffff;
            padding: 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s ease;

        .nt-live-sim-item:hover {
            border-color: rgba(37, 99, 235, 0.28);

        .nt-live-sim-item.active {
            border-color: rgba(37, 99, 235, 0.45);
            background: rgba(37, 99, 235, 0.07);

        }

        .nt-live-sim-dashboard-subtitle {

        .nt-live-sim-metric-label {

                grid-template-columns: repeat(2, minmax(0, 1fr));

                grid-template-columns: 90px 70px repeat(2, minmax(0, 1fr));
                overflow-x: auto;
            }

            .nt-live-sim-metric-grid {
                grid-template-columns: 1fr;

            }

        /* ===============================
           Live simulation refresh button
        ================================ */
        
        .nt-live-sim-list-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .nt-live-sim-refresh-btn {
            border: 1px solid rgba(37, 99, 235, 0.22);
            background: #ffffff;
            color: var(--nt-blue);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 12px;
            line-height: 1;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        
        .nt-live-sim-refresh-btn:hover {
            background: var(--nt-blue);
            color: #ffffff;
        }
        
        .nt-live-sim-refresh-btn:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            transform: none;
        }

        /* ===============================
           Live simulation latest signal badge
        ================================ */
        
        .nt-live-sim-signal-row {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
            margin-top: 7px;
        }
        
        .nt-live-sim-signal-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 5px 9px;
            font-size: 11px;
            line-height: 1.2;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.035em;
        }
        
        .nt-live-sim-signal-badge::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: currentColor;
        }
        
        .nt-live-sim-signal-badge.buy {
            color: var(--nt-positive);
            background: rgba(22, 163, 74, 0.10);
        }
        
        .nt-live-sim-signal-badge.sell {
            color: var(--nt-negative);
            background: rgba(220, 38, 38, 0.10);
        }
        
        .nt-live-sim-signal-badge.hold {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.12);
        }
        
        .nt-live-sim-signal-badge.unknown {
            color: var(--nt-neutral);
            background: rgba(100, 116, 139, 0.08);
        }
        
        .nt-live-sim-signal-price {
            font-size: 11px;
            line-height: 1.35;
            font-weight: 750;
            color: var(--nt-neutral);
        }
        
        .nt-live-sim-detail-signal-wrap {
            margin-top: 8px;
        }

        /* ===============================
           Live simulation created highlight
        ================================ */
        
        .nt-live-sim-board-row.just-created {
            border-color: rgba(22, 163, 74, 0.65);
            background: rgba(22, 163, 74, 0.08);
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.10);
            animation: ntLiveSimCreatedPulse 1.8s ease-out;
        }
        
        @keyframes ntLiveSimCreatedPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.28);
            }
        
            40% {
                transform: scale(1.015);
                box-shadow: 0 0 0 8px rgba(22, 163, 74, 0.13);
            }
        
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.10);
            }
        }

           Live simulation logged-out state
        ================================ */
        
        .nt-live-sim-auth-empty {
            border: 1px dashed rgba(37, 99, 235, 0.35);
            background: rgba(37, 99, 235, 0.045);
            border-radius: 16px;
            padding: 18px;
            margin-top: 14px;
        }
        
        .nt-live-sim-auth-kicker {
            font-size: 11px;
            font-weight: 900;
            color: var(--nt-blue);
            text-transform: uppercase;
            letter-spacing: 0.055em;
            margin-bottom: 6px;
        }
        
        .nt-live-sim-auth-title {
            font-size: 16px;
            line-height: 1.25;
            font-weight: 900;
            color: var(--nt-dark);
            margin-bottom: 7px;
        }
        
        .nt-live-sim-auth-text {
            font-size: 13px;
            line-height: 1.55;
            font-weight: 600;
            color: var(--nt-neutral);
            margin-bottom: 12px;
        }
        
        .nt-live-sim-auth-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .nt-live-sim-auth-btn {
            border: none;
            border-radius: 999px;
            background: var(--nt-dark);
            color: #ffffff;
            padding: 9px 13px;
            font-size: 12px;
            font-weight: 900;

            transition: all 0.15s ease;

        .nt-live-sim-auth-note {
            font-size: 11px;
            line-height: 1.4;
            font-weight: 700;
            color: var(--nt-neutral);
        }

           Live simulation layout rebalance

        ================================ */

            grid-template-columns: minmax(240px, 320px) minmax(600px, 1fr);
            align-items: stretch;
        }
        
        .nt-live-sim-layout > .nt-live-sim-card:first-child .nt-live-sim-form-grid {
            grid-template-columns: 1fr;

        .nt-live-sim-layout > .nt-live-sim-card:nth-child(2) {

        }

            .nt-live-sim-layout {
                grid-template-columns: minmax(320px, 430px) minmax(360px, 1fr);
            }
        }
        
        @media (max-width: 850px) {
            .nt-live-sim-layout {
                grid-template-columns: 1fr;
            }
        }

           Equal height live simulation cards
        ================================ */
        
        .nt-live-sim-layout {
            align-items: stretch;
        }
        
        /* Make both top cards stretch to the same row height */
        .nt-live-sim-layout > .nt-live-sim-card {
            height: 100%;
        }
        
        /* Keep each card content organized vertically */
        .nt-live-sim-layout > .nt-live-sim-card:first-child,
        .nt-live-sim-layout > .nt-live-sim-card:nth-child(2) {
            display: flex;
            flex-direction: column;
        }
        
        /* Let the simulations list use available height cleanly */
        .nt-live-sim-layout > .nt-live-sim-card:nth-child(2) .nt-live-sim-list {
            flex: 1;
        }

           Live simulation assumptions
        ================================ */
        
        .nt-live-sim-assumptions {
            margin-top: 14px;
            border: 1px solid var(--nt-border);
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.045);
            overflow: hidden;

            list-style: none;
            cursor: pointer;
            padding: 13px 15px;

            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 13px;
            font-weight: 900;
            color: var(--nt-dark);

            display: none;

            color: var(--nt-dark);

            background: #ffffff !important;
            color: var(--nt-dark) !important;
        }
        
        .nt-live-sim-board-top-buttons .nt-live-sim-reset-view-btn:hover {
            background: #F1F5F9 !important;
            border-color: #CBD5E1 !important;
        }
        
        /* Make simulation board tall enough for about 5 rows */
        .nt-live-sim-board-scroll {
            max-height: 355px !important;
        }
        
        /* Ensure Since Start / selected horizon is blue by default */
        .nt-live-sim-horizon-pills .period-pill.active {
            background: var(--nt-blue) !important;
            color: #ffffff !important;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.25) !important;
        }
        
        /* Keep non-active horizon buttons gray like Signal Overview */
        .nt-live-sim-horizon-pills .period-pill:not(.active) {
            background: transparent !important;
            color: var(--nt-neutral) !important;
        }
        
        /* Keep asset type active dark like Signal Overview */
        .nt-live-sim-controls-card .asset-pill.active {
            background: var(--nt-dark) !important;
            color: #ffffff !important;
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.22) !important;
        }

        /* ===============================
           Model summary cards as passive info
           Applies consistently to all model intros
        ================================ */
        
        .nt-model-summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin: 16px 0 22px 0;
        }
        
        .nt-model-summary-card {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 13px 14px;
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-left: 4px solid rgba(37, 99, 235, 0.45);
            border-radius: 14px;
            background: linear-gradient(180deg, #F8FAFC 0%, #FFFFFF 100%);
            min-width: 0;
            box-shadow: none;
        }
        
        .nt-model-summary-card:hover {
            transform: none;
            box-shadow: none;
        }
        
        .nt-model-summary-icon {
            width: 34px;
            height: 34px;
            flex: 0 0 34px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(37, 99, 235, 0.08);
            color: var(--nt-blue);
            font-size: 16px;
            font-weight: 900;
        }
        
        .nt-model-summary-label {
            font-size: 10px;
            line-height: 1.25;
            font-weight: 900;
            color: var(--nt-neutral);
            text-transform: uppercase;
            letter-spacing: 0.055em;
            margin-bottom: 4px;
        }
        
        .nt-model-summary-value {
            font-size: 13px;
            line-height: 1.35;
            font-weight: 850;
            color: var(--nt-dark);
        }
        
        @media (max-width: 1050px) {
            .nt-model-summary-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        
        @media (max-width: 600px) {
            .nt-model-summary-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===============================
           Model intro cards as passive information
           Applies to EpochSignaler, AltIndexer, EpochForecaster
        ================================ */
        
        .nt-model-panel > .nt-model-panel-header:first-child {
            padding: 18px 18px 0 18px;
            border-radius: 18px 18px 0 0;
            background:
                radial-gradient(circle at top right, rgba(37, 99, 235, 0.08), transparent 32%),
                #ffffff;
            border: 1px solid var(--nt-border);
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .nt-model-panel > .nt-model-summary-grid {
            margin: 0 0 22px 0;
            padding: 0 18px 18px 18px;
            border: 1px solid var(--nt-border);
            border-top: none;
            border-radius: 0 0 18px 18px;
            background: #ffffff;
        }
        
        .nt-model-summary-card {
            border-left: 4px solid rgba(37, 99, 235, 0.45);
            background: linear-gradient(180deg, #F8FAFC 0%, #FFFFFF 100%);
            box-shadow: none;
        }
        
        .nt-model-summary-card:hover {
            transform: none;
            box-shadow: none;
        }
        
        /* ===============================
           EpochSignaler horizontal sub-tabs
           Signal Overview | Backtest | Live Simulation
        ================================ */
        
        .nt-epoch-subworkspace {
            width: 100%;
            min-width: 0;
            margin-top: 20px;
        }
        
        .nt-epoch-subnav-card {
            position: relative;
            padding: 16px;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            background: #F8FAFC;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.05);
            margin-bottom: 18px;
        }
        
        .nt-epoch-subnav-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 14px;
        }
        
        .nt-epoch-subnav-kicker {
            font-size: 11px;
            line-height: 1.2;
            font-weight: 900;
            letter-spacing: 0.055em;
            text-transform: uppercase;
            color: var(--nt-blue);
            margin-bottom: 6px;
        }
        
        .nt-epoch-subnav-title {
            margin: 0;
            font-size: 17px;
            line-height: 1.25;
            font-weight: 900;
            color: var(--nt-dark);
        }
        
        .nt-epoch-subnav-subtitle {
            max-width: 760px;
            margin: 5px 0 0 0;
            font-size: 12px;
            line-height: 1.45;
            font-weight: 600;
            color: var(--nt-neutral);
        }
        
        .nt-epoch-tool-tabs {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        
        .nt-epoch-tool-tab {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 11px;
            min-height: 72px;
            padding: 13px 14px;
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            background: #ffffff;
            color: var(--nt-dark);
            cursor: pointer;
            text-align: left;
            transition: all 0.15s ease;
        }
        
        .nt-epoch-tool-tab:hover {
            background: #F1F5F9;
            border-color: #CBD5E1;
            transform: translateY(-1px);
        }
        
        .nt-epoch-tool-tab.active {
            background: var(--nt-dark);
            border-color: var(--nt-dark);
            color: #ffffff;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.14);
        }
        
        /* Down arrow from active tab to the content block */
        .nt-epoch-tool-tab.active::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -18px;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 11px solid transparent;
            border-right: 11px solid transparent;
            border-top: 12px solid var(--nt-dark);
            z-index: 5;
        }
        
        .nt-epoch-tool-tab-icon {
            width: 36px;
            height: 36px;
            flex: 0 0 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(37, 99, 235, 0.10);
            font-size: 16px;
        }
        
        .nt-epoch-tool-tab.active .nt-epoch-tool-tab-icon {
            background: rgba(255, 255, 255, 0.14);
        }
        
        .nt-epoch-tool-tab strong {
            display: block;
            font-size: 13px;
            line-height: 1.25;
            font-weight: 900;
        }
        
        .nt-epoch-tool-tab small {
            display: block;
            margin-top: 3px;
            font-size: 11px;
            line-height: 1.35;
            font-weight: 650;
            color: var(--nt-neutral);
        }
        
        .nt-epoch-tool-tab.active small {
            color: rgba(255, 255, 255, 0.72);
        }
        
        .nt-epoch-tool-content-card {
            width: 100%;
            min-width: 0;
            padding: 18px;
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 2px 14px rgba(15, 23, 42, 0.06);
        }
        
        .nt-epoch-tool-panels {
            width: 100%;
            min-width: 0;
        }
        
        .nt-epoch-tool-panel {
            display: none;
            width: 100%;
            min-width: 0;
        }
        
        .nt-epoch-tool-panel.nt-epoch-tool-panel-active {
            display: block;
        }
        
        /* Remove old card-in-card spacing inside the new content panel */
        #epochsignaler-section .nt-epoch-tool-panel > .results-section,
        #epochsignaler-section .nt-epoch-tool-panel > .nt-backtest-section,
        #epochsignaler-section .nt-epoch-tool-panel > .nt-live-sim-section {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
        }
        
        /* Signal overview should feel integrated inside the panel */
        #epochsignaler-section .nt-epoch-tool-panel > .nt-epoch-dashboard {
            padding: 0 !important;
            border: none !important;
            box-shadow: none !important;
            background: transparent !important;
        }
        
        /* Keep Backtest and Live Simulation as internal cards */
        #epochsignaler-section .nt-epoch-tool-panel > .nt-backtest-section,
        #epochsignaler-section .nt-epoch-tool-panel > .nt-live-sim-section {
            border-radius: 16px;
        }
        
        /* Responsive */
        @media (max-width: 900px) {
            .nt-epoch-tool-tabs {
                grid-template-columns: 1fr;
            }
        
            .nt-epoch-tool-tab.active::after {
                display: none;
            }
        
            .nt-epoch-tool-content-card {
                padding: 14px;
            }
        }

        .signal-locked {
            color: #92400E;
            background: rgba(245, 158, 11, 0.12);
            border: 1px solid rgba(245, 158, 11, 0.25);
            filter: none;
        }

    </style>

</head>
<body>

    <!-- Navigation bar -->
    <div class="navbar">
        <div class="logo">
            <a href="https://neuraltrend.org">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="My Logo">
            </a>
        </div>
    
        <!-- LEFT: nav links -->
        <div class="nav-links">
            <!-- <a href="https://neuraltrend.org">Home</a> -->
            <!-- <a href="https://github.com/neuraltrend/">Sample Algorithms</a> -->
            <!-- <a href="/market">Market Insight</a> -->
            <!-- <a href="/knowledge">Knowledge Hub</a> -->
            <!-- <a href="mailto:contact@neuraltrend.org">Contact</a> -->
        </div>
    
        <!-- RIGHT: login area -->
        <div class="auth-area">
            <span id="user-area">
                <a href="#" id="login-btn">Login</a>
            </span>
        </div>
    </div>

    <!-- ✅ PAGE CONTENT -->
    {% block content %}{% endblock %}

    <!-- Footer -->
    <div class="footer">
        <a href="/privacy">Privacy Notice</a>
    </div>

    <!-- ✅ LOGIN MODAL -->    
    <div id="loginModal" class="modal">
      <div class="modal-content">
    
        <span class="close-btn">&times;</span>
    
        <h3>Login / Signup</h3>

        <input type="email" id="emailInput" placeholder="Email">
        <input type="password" id="passwordInput" placeholder="Password">       
        
        <button id="signupBtn">Sign up</button>
        <button id="signinBtn">Login</button>

        <a href="#" id="forgot-password" style="display:block; margin:10px 0; font-size: 13px;">
            Forgot password?
        </a>  
    
        <p id="authMessage"></p>
    
      </div>
    </div>
    
    <!-- 100% privacy-first analytics -->
    <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    
    <script>
    // const loginBtn = document.getElementById("login-btn");
    const loginModal = document.getElementById("loginModal"); // FIXED
    const closeModal = document.querySelector(".close-btn");
    
    const signupBtn = document.getElementById("signupBtn");
    const signinBtn = document.getElementById("signinBtn");
    
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    
    const authMessage = document.getElementById("authMessage");
    const userArea = document.getElementById("user-area");
    
    // ------------------
    // Close modal
    // ------------------
    closeModal.addEventListener("click", function() {
        loginModal.style.opacity = "0";
        setTimeout(() => {
            loginModal.style.display = "none";
        }, 300);
    });
    
    window.addEventListener("click", function(e) {
        if (e.target === loginModal) {
            loginModal.style.opacity = "0";
            setTimeout(() => {
                loginModal.style.display = "none";
            }, 300);
        }
    });

    signupBtn.addEventListener("click", async function() {
        const response = await fetch("/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: emailInput.value.trim(),
                password: passwordInput.value
            })
        });
    
        const data = await response.json();
    
        if (data.message) {
            authMessage.innerText = "Check your email to verify your account.";
    
            // Close modal after short delay (better UX)
            setTimeout(() => {
                loginModal.style.opacity = "0";
                setTimeout(() => {
                    loginModal.style.display = "none";
                }, 300);
            }, 1500);
    
        } else {
            authMessage.innerText = data.error;
        }
    });
    
    // ------------------
    // Login
    // ------------------
    signinBtn.addEventListener("click", async function() {
        const email = emailInput.value;
        const password = passwordInput.value;
    
        const response = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: emailInput.value.trim(),
                password: passwordInput.value
            })
        });
    
        const data = await response.json();
    
        if (data.message) {
            authMessage.innerText = data.message;
            loginModal.style.opacity = "0";
            setTimeout(() => {
                loginModal.style.display = "none";
            }, 300);
            await checkUser();

            if (typeof refreshLiveSimAuthState === "function") {
                await refreshLiveSimAuthState();
            }
            
            if (typeof loadLiveSimulations === "function") {
                await loadLiveSimulations();
            }
        } else {
            authMessage.innerText = data.error;
        }
    });
    
    // ------------------
    // Logout
    // ------------------
    async function logout() {
        await fetch("/logout", {
            method: "POST"
        });
    
        userArea.innerHTML = `<a href="#" id="login-btn">Login</a>`;
        location.reload();
    }

    // ------------------
    // Password Reset
    // ------------------
    document.addEventListener("click", async function(e) {
        if (e.target && e.target.id === "forgot-password") {
            e.preventDefault();
    
            const email = prompt("Enter your email:");
            if (!email) return;
    
            const res = await fetch("/request-password-reset", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ email })
            });
    
            const data = await res.json();
            alert(data.message);
        }
    });

    // ------------------
    // Delete Account
    // ------------------
    async function deleteAccount() {
        const confirmDelete = confirm("Are you sure you want to permanently delete your account?");
    
        if (!confirmDelete) return;
    
        const response = await fetch("/request-delete-account", {
            method: "POST"
        });
    
        const data = await response.json();
    
        alert(data.message);
    }
    
    // ------------------
    // Check current user
    // ------------------
    async function checkUser() {
        const response = await fetch("/me");
        const data = await response.json();
    
        if (data.email) {
            userArea.innerHTML = `
                <div class="user-menu" id="userMenu">
                    <div class="user-pill">
                        ${data.email}
                        <span class="arrow">▼</span>
                    </div>
            
                    <div class="dropdown" id="dropdownMenu" style="display:none;">
                        <div onclick="logout()">Logout</div>
                        <div onclick="deleteAccount()" style="color:red;">Delete Account</div>
                    </div>
                </div>
            `;
        } else {
            // 🔑 reset to login button if not authenticated
            userArea.innerHTML = `<a href="#" id="login-btn">Login</a>`;
        }
    }
    
    document.addEventListener("click", function(e) {
    
        // ✅ Handle Login button (works even after re-render)
        if (e.target && e.target.id === "login-btn") {
            e.preventDefault();
            loginModal.style.display = "flex";
            loginModal.style.opacity = "1";
            return;
        }
    
        // ✅ Dropdown logic
        const menu = document.getElementById("userMenu");
        const dropdown = document.getElementById("dropdownMenu");
    
        if (!menu || !dropdown) return;
    
        const pill = menu.querySelector(".user-pill");
    
        if (pill && pill.contains(e.target)) {
            dropdown.style.display =
                dropdown.style.display === "block" ? "none" : "block";
        } else {
            dropdown.style.display = "none";
        }
    });
    
    // Run on page load
    checkUser();
    </script>

</body>
</html>
